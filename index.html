    :root {

      /* Liquid Glass system backgrounds (dark) */

      --glass-2: linear-gradient(160deg, #2E2E30 0%, #262628 100%);
      --glass-3: linear-gradient(160deg, #3C3C3E 0%, #343436 100%);
      --glass-4: linear-gradient(160deg, #4A4A4C 0%, #424244 100%);

      --border-1: rgba(255,255,255,0.08);
      --border-2: rgba(255,255,255,0.13);
      --border-3: rgba(255,255,255,0.20);

      /* Liquid Glass labels (dark) */

      --label-2: rgba(235,235,245,0.60);
      --label-3: rgba(235,235,245,0.30);

      --accent-red:    #FF453A;

    :root {

      --label-1: rgba(255,255,255,.98);
      --label-2: rgba(235,241,255,.70);
      --label-3: rgba(228,236,255,.46);
      --label-4: rgba(228,236,255,.24);

      --accent: #70b8ff;
      --accent-strong: #0a84ff;
      --accent-green: #49df7d;
      --accent-red: #ff6961;
      --accent-orange: #ffad33;
      --accent-yellow: #ffd75e;
      --accent-purple: #c67cff;
      --gold: #ffd75e;

      --shadow-sm: 0 8px 28px rgba(0,0,0,.24), 0 2px 7px rgba(0,0,0,.20);
      --shadow-md: 0 16px 48px rgba(0,0,0,.31), 0 4px 14px rgba(0,0,0,.22);
      --shadow-lg: 0 28px 90px rgba(0,0,0,.50), 0 8px 24px rgba(0,0,0,.30);
      --shadow-glow: 0 0 0 1px rgba(255,255,255,.03), 0 16px 50px rgba(20,94,190,.14);

      --radius-sm: 22px;
      --radius-md: 24px;
      --radius-lg: 30px;
      --radius-xl: 40px;
      --ease-spring: cubic-bezier(.2,1.28,.35,1);
      --ease-out: cubic-bezier(.2,.8,.2,1);
    }

    html {
      background: #05070d;
    }

    body {
      position: relative;
      isolation: isolate;
      padding-bottom: calc(106px + var(--safe-bottom));
      background:
        radial-gradient(ellipse 100% 58% at 50% -13%, rgba(44,139,255,.28), transparent 62%),
        radial-gradient(ellipse 66% 46% at -8% 68%, rgba(44,214,155,.13), transparent 69%),
        radial-gradient(ellipse 68% 46% at 108% 78%, rgba(168,88,255,.16), transparent 68%),
        linear-gradient(180deg, #07101d 0%, #070a12 48%, #04060b 100%);
      background-attachment: scroll;
    }

    .pitch-bg {
      position: relative;
      isolation: isolate;
      min-height: 100dvh;
    }
    .pitch-bg::before,
    .pitch-bg::after {
      content: "";
      position: fixed;
      z-index: -1;
      pointer-events: none;
      border-radius: 999px;
      filter: blur(74px);
      opacity: .72;
      will-change: transform;
    }
    .pitch-bg::before {
      width: min(62vw, 560px);
      height: min(62vw, 560px);
      left: -18vw;
      top: 21vh;
      background: radial-gradient(circle at 65% 35%, rgba(52,199,255,.30), rgba(10,132,255,.10) 45%, transparent 72%);
      animation: liquidFloatA 18s ease-in-out infinite alternate;
    }
    .pitch-bg::after {
      width: min(70vw, 650px);
      height: min(70vw, 650px);
      right: -25vw;
      bottom: 4vh;
      background: radial-gradient(circle at 34% 40%, rgba(191,90,242,.25), rgba(48,209,88,.08) 48%, transparent 73%);
      animation: liquidFloatB 22s ease-in-out infinite alternate;
    }
    @keyframes liquidFloatA {
      from { transform: translate3d(-2%, -2%, 0) scale(.96); }
      to   { transform: translate3d(13%, 10%, 0) scale(1.08); }
    }
    @keyframes liquidFloatB {
      from { transform: translate3d(4%, 5%, 0) scale(1.02); }
      to   { transform: translate3d(-11%, -9%, 0) scale(.94); }
    }

    .glass,
    .glass-strong,
    .match-card,
    .filters-sticky,
    section.bg-white,
    .install-banner {
      backdrop-filter: blur(28px) saturate(175%);
    }

    .glass {
      background: var(--glass-1);
      border-color: var(--border-1);
      box-shadow: var(--shadow-sm), var(--hl), var(--shadow-glow);
    }
    .glass-strong {
      background: var(--glass-2);
      border-color: var(--border-2);
      box-shadow: var(--shadow-md), var(--hl2), var(--shadow-glow);
    }

    /* Floating glass header */
    .app-header {
      top: calc(var(--safe-top) + 8px);
      width: min(760px, calc(100% - 20px));
      margin: 10px auto 0;
      padding: 10px 11px 10px 12px;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 26px;
      backdrop-filter: blur(34px) saturate(190%);
      box-shadow: 0 20px 60px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.24), inset 0 -1px 0 rgba(255,255,255,.05);

    .app-header .logo-icon {

      height: 43px;
      border-radius: 15px;

        radial-gradient(circle at 28% 18%, rgba(255,255,255,.95), rgba(255,255,255,.34) 38%, transparent 39%),

      border: 1px solid rgba(255,255,255,.40);
      box-shadow: inset 0 1px 1px rgba(255,255,255,.48), 0 7px 22px rgba(33,112,255,.30);
      text-shadow: 0 2px 8px rgba(0,0,0,.35);

    .login-btn,

      background:
        radial-gradient(circle at 25% 0%, rgba(255,255,255,.19), transparent 44%),
        rgba(255,255,255,.075);
      border-color: rgba(255,255,255,.17);
      backdrop-filter: blur(18px) saturate(170%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 5px 16px rgba(0,0,0,.16);
    }
    .login-btn:hover,
    .players-btn:hover {
      background:
        radial-gradient(circle at 25% 0%, rgba(255,255,255,.25), transparent 44%),
        rgba(255,255,255,.12) !important;
      border-color: rgba(255,255,255,.28);
      transform: translateY(-1px);
    }

    /* Content */
    .app-content {
      max-width: 760px;
      padding: 18px 12px 118px;
    }
    .filters-sticky {
      position: sticky;
      top: var(--header-height, 80px);
      z-index: 20;
      background:
        radial-gradient(circle at 18% -20%, rgba(255,255,255,.20), transparent 42%),
        linear-gradient(145deg, rgba(28,36,54,.75), rgba(14,19,31,.60)) !important;
      border: 1px solid rgba(255,255,255,.18) !important;
      box-shadow: var(--shadow-md), var(--hl2), 0 0 0 1px rgba(0,0,0,.12) !important;
      backdrop-filter: blur(32px) saturate(190%);
    }

    .match-card {
      position: relative;
      background: var(--glass-1) !important;
      border-color: var(--border-1) !important;
      border-radius: 24px !important;
      backdrop-filter: blur(26px) saturate(175%);
      box-shadow: var(--shadow-sm), var(--hl), var(--shadow-glow) !important;
      transform: translateZ(0);
      transition: transform .28s var(--ease-out), border-color .28s ease, box-shadow .28s ease, background .28s ease !important;
    }

    .match-card:hover {
      border-color: rgba(255,255,255,.23) !important;
      box-shadow: var(--shadow-md), var(--hl2), 0 18px 55px rgba(18,93,190,.13) !important;
      transform: translateY(-2px) scale(1.002);

      background: linear-gradient(135deg, rgba(255,255,255,.045), rgba(255,255,255,.012)) !important;
    }

    section.bg-white,
    div.bg-white {
      background: var(--glass-1) !important;
      border-color: var(--border-1) !important;
      box-shadow: var(--shadow-sm), var(--hl), var(--shadow-glow);
    }
    section.bg-white:hover {
      border-color: rgba(255,255,255,.20) !important;
    }

    .install-banner {
      background: var(--glass-2);
      border-color: var(--border-2);
      box-shadow: var(--shadow-md), var(--hl2), var(--shadow-glow);
    }

    /* Floating liquid tab bar */
    .bottom-nav {
      left: 10px;
      right: 10px;
      bottom: calc(5px + var(--safe-bottom));
      width: min(740px, calc(100% - 20px));
      margin: 0 auto;
      padding-bottom: 0;
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% -30%, rgba(255,255,255,.22), transparent 44%),
        linear-gradient(145deg, rgba(25,33,49,.72), rgba(10,14,24,.58));
      backdrop-filter: blur(34px) saturate(190%);
      box-shadow: 0 24px 70px rgba(0,0,0,.44), inset 0 1px 0 rgba(255,255,255,.24), inset 0 -1px 0 rgba(255,255,255,.045);
    }
    .nav-track {
      padding: 7px;
      gap: 2px;
      isolation: isolate;
    }
    .nav-droplet {
      top: 7px;
      bottom: 7px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 28% 0%, rgba(255,255,255,.38), transparent 42%),
        linear-gradient(145deg, rgba(82,178,255,.39), rgba(35,105,248,.25) 58%, rgba(133,82,245,.18));
      border: 1px solid rgba(158,216,255,.55);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.38),
        inset 0 -1px 0 rgba(255,255,255,.07),
        0 7px 20px rgba(28,112,255,.22),
        0 0 0 1px rgba(77,160,255,.08);
      will-change: left, width, transform;
      transform: translateZ(0);
    }
    .nav-droplet.dragging {
      transform: translateZ(0) scale(1.025);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.42),
        inset 0 -1px 0 rgba(255,255,255,.08),
        0 10px 27px rgba(28,112,255,.29),
        0 0 0 1px rgba(77,160,255,.12);
    }
    .bottom-nav button {
      min-height: 58px;
      padding: 8px 2px 7px;
      color: rgba(226,235,255,.45);
      border-radius: 999px;
      background: transparent !important;
      overflow: hidden;
      text-shadow: none;
      transition: color .22s var(--ease-out), transform .16s var(--ease-spring), opacity .22s ease !important;
    }
    .bottom-nav button:hover,
    .bottom-nav button:focus-visible,
    .bottom-nav button.active {
      background: transparent !important;
    }
    .bottom-nav button:not(.active) svg { opacity: .72; }

    .bottom-nav button.active {
      color: #eef8ff !important;
      text-shadow: 0 1px 12px rgba(90,184,255,.42);
    }
    .bottom-nav button.active svg {
      stroke: #eef8ff;
      opacity: 1;
      stroke-width: 2.25;
      filter: drop-shadow(0 0 7px rgba(100,190,255,.45));
      transform: translateY(-1px) scale(1.04);
    }
    .bottom-nav button.active .nav-label {
      opacity: 1;
      font-weight: 800;
      letter-spacing: .035em;
    }
    .bottom-nav button svg {
      opacity: .88;
      stroke-width: 2.05;
      transition: opacity .22s ease, transform .22s var(--ease-spring), filter .22s ease, stroke .22s ease;
    }
    .rounded-lg, .rounded-xl, .rounded-2xl, .rounded { background-clip: padding-box; }

      background:
        linear-gradient(145deg, rgba(255,255,255,.105), rgba(255,255,255,.045)) !important;

    .deferred-card {
      content-visibility: auto;

      .admin-tabs-grid .selection-tile {
        min-height: 68px;
        font-size: 13px !important;
        padding: 9px 10px !important;
      }

    /* Unified selected-state polish */
    .selection-tile {
      position: relative;
      border-radius: var(--radius-sm) !important;
      border: 1px solid rgba(255,255,255,.13) !important;
      background:
        radial-gradient(circle at 22% -20%, rgba(255,255,255,.11), transparent 45%),
        linear-gradient(145deg, rgba(255,255,255,.080), rgba(255,255,255,.030)) !important;
      color: rgba(235,241,255,.72) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.075), 0 2px 8px rgba(0,0,0,.10);
      transition: background .18s var(--ease-out), border-color .18s var(--ease-out), box-shadow .18s var(--ease-out), color .18s var(--ease-out), transform .14s var(--ease-spring) !important;
    }
    .selection-tile:hover {
      background:
        radial-gradient(circle at 22% -20%, rgba(255,255,255,.17), transparent 45%),
        linear-gradient(145deg, rgba(255,255,255,.115), rgba(255,255,255,.050)) !important;
      border-color: rgba(255,255,255,.22) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 5px 14px rgba(0,0,0,.14);

    }
    .selection-tile.is-selected,
    .selection-tile.is-selected:hover {
      background:
        radial-gradient(circle at 24% -8%, rgba(255,255,255,.34), transparent 45%),
        linear-gradient(145deg, rgba(62,174,255,.58), rgba(36,101,242,.43) 58%, rgba(108,73,238,.34)) !important;
      border-color: rgba(151,211,255,.58) !important;
      color: #f5fbff !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.34),
        inset 0 -1px 0 rgba(255,255,255,.07),
        0 7px 18px rgba(22,112,255,.22),
        0 0 0 1px rgba(65,151,255,.10);
      text-shadow: 0 1px 8px rgba(48,143,255,.22);
    }

    .selection-tile.is-correct,
    .selection-tile.is-correct:hover {
      background: rgba(0,160,60,.30) !important;
      border-color: rgba(0,220,80,.45) !important;
      color: #4ade80 !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.14),
        0 7px 18px rgba(0,160,60,.10);

    .selection-tile.is-wrong,
    .selection-tile.is-wrong:hover {
      background: rgba(180,0,0,.28) !important;
      border-color: rgba(220,0,0,.40) !important;
      color: #f87171 !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),

      outline: 2px solid rgba(132,204,255,.90);

    .selection-tile:disabled {

    .player-choice-avatar {

      border: 1px solid rgba(255,255,255,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);

    .player-choice.is-selected .player-choice-avatar {

    .admin-match-summary-main {

      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

    .admin-score-editor {

      }

    /* ═══════════════════════════════════════════════════════════════
       FLAT LIQUID GLASS BORDERS — thinner, subtler, less 3D
       Inspired by the attached reference: soft glass with fine outlines.
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --border-1: rgba(255,255,255,.14);
      --border-2: rgba(255,255,255,.18);
      --border-3: rgba(255,255,255,.24);
      --sep: rgba(255,255,255,.10);
      --hl: none;
      --hl2: none;
      --shadow-sm: 0 10px 24px rgba(0,0,0,.16);
      --shadow-md: 0 14px 34px rgba(0,0,0,.18);
      --shadow-lg: 0 22px 54px rgba(0,0,0,.24);
      --shadow-glow: none;
    }

    .glass,
    .glass-strong,
    .match-card,
    .filters-sticky,
    section.bg-white,
    div.bg-white,
    .install-banner,
    .app-header,
    .bottom-nav,
    .login-btn,
    .players-btn,
    .selection-tile,
    input,
    select,
    textarea,
    .fixed.inset-0.z-50 > .relative,
    .toast-bar {
      border-width: 1px !important;
      border-style: solid !important;
      border-color: rgba(255,255,255,.16) !important;
      box-shadow: 0 12px 28px rgba(0,0,0,.16) !important;
    }

    .glass,
    section.bg-white,
    div.bg-white,
    .match-card,
    .install-banner {
      background:
        linear-gradient(145deg, rgba(255,255,255,.095), rgba(255,255,255,.035)) !important;
    }

    .glass-strong,
    .filters-sticky,
    .bottom-nav,
    .fixed.inset-0.z-50 > .relative,
    .toast-bar {
      background:
        linear-gradient(145deg, rgba(34,45,70,.72), rgba(12,18,31,.58)) !important;
    }

    .app-header,
    .bottom-nav,
    .filters-sticky,
    .fixed.inset-0.z-50 > .relative {
      box-shadow: 0 16px 38px rgba(0,0,0,.20) !important;
    }

    .login-btn,
    .players-btn,
    input,
    select,
    textarea,
    .selection-tile {
      box-shadow: 0 6px 16px rgba(0,0,0,.10) !important;
      background:
        linear-gradient(145deg, rgba(255,255,255,.09), rgba(255,255,255,.03)) !important;
    }

    .login-btn:hover,
    .players-btn:hover,
    .selection-tile:hover,
    input:hover,
    select:hover,
    textarea:hover {
      border-color: rgba(255,255,255,.22) !important;
      box-shadow: 0 8px 18px rgba(0,0,0,.12) !important;
      transform: translateY(-1px);
    }

    .selection-tile.is-selected,
    .selection-tile.is-selected:hover,
    .bottom-nav button.active {
      border-color: rgba(160,214,255,.44) !important;
      box-shadow: 0 8px 20px rgba(26,106,255,.14) !important;
    }

    .selection-tile.is-selected,
    .selection-tile.is-selected:hover {
      background:
        linear-gradient(145deg, rgba(93,184,255,.30), rgba(52,106,240,.20) 58%, rgba(114,83,241,.16)) !important;
      text-shadow: none !important;
    }

    .selection-tile.is-correct,
    .selection-tile.is-correct:hover {
      box-shadow: 0 8px 18px rgba(0,160,60,.10) !important;
    }

    .selection-tile.is-wrong,
    .selection-tile.is-wrong:hover {
      box-shadow: 0 8px 18px rgba(180,0,0,.08) !important;
    }

    .match-card:hover,
    section.bg-white:hover,
    .glass:hover,
    .glass-strong:hover {
      border-color: rgba(255,255,255,.20) !important;
      box-shadow: 0 14px 32px rgba(0,0,0,.18) !important;
    }

    .nav-droplet {
      border: 1px solid rgba(154,211,255,.42) !important;
      background:
        linear-gradient(145deg, rgba(108,190,255,.28), rgba(49,109,250,.18) 58%, rgba(126,92,245,.14)) !important;
      box-shadow: 0 8px 20px rgba(26,106,255,.16) !important;
    }

    .bottom-nav button.active {
      background:
        linear-gradient(145deg, rgba(111,192,255,.12), rgba(64,116,244,.08) 56%, rgba(128,92,244,.06)) !important;
      text-shadow: none !important;
    }

    .app-header .logo-icon,
    .loading-icon {
      box-shadow: 0 10px 24px rgba(26,111,255,.18) !important;
      border: 1px solid rgba(255,255,255,.30) !important;
    }

    .fixed.inset-0.z-50 > .absolute.inset-0 {
      background: rgba(2,4,10,.46) !important;
    }

    /* Final geometry fixes: phase label pill + square score centre. */
    .match-card > button:first-child span[style*="text-transform: uppercase"] {
      border-radius: 999px !important;
    }
    .score-input-shell {
      gap: 0 !important;
    }
    .score-input-shell .score-value-input,
    .admin-score-controls .score-value-input {
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }

    /* Disable hover lift/bounce while preserving click/drag feedback. */
    @media (hover: hover) and (pointer: fine) {
      button:hover,
      [role="button"]:hover,
      .match-card:hover,
      section.bg-white:hover,
      div.bg-white:hover,
      .glass:hover,
      .glass-strong:hover,
      .login-btn:hover,
      .players-btn:hover,
      .selection-tile:hover,
      input:hover,
      select:hover,
      textarea:hover,
      .bg-\[\#0d1b5e\]:hover,
      .bg-\[\#162570\]:hover {
        transform: none !important;
      }
    }

    /* Selected states without glow */
    .selection-tile.is-selected,
    .selection-tile.is-selected:hover,
    .selection-tile.is-correct,
    .selection-tile.is-correct:hover,
    .selection-tile.is-wrong,
    .selection-tile.is-wrong:hover,
    .player-choice.is-selected,
    .player-choice.is-selected .player-choice-avatar,
    .bottom-nav button.active,
    .nav-droplet,
    .nav-droplet.dragging {
      box-shadow: none !important;
      text-shadow: none !important;
      filter: none !important;
    }

    .bottom-nav button.active svg,
    .bottom-nav button.active .nav-label {
      filter: none !important;
      text-shadow: none !important;
    }

    .selection-tile.is-selected,
    .selection-tile.is-selected:hover {
      border-color: rgba(151,211,255,.52) !important;
    }

    .nav-droplet,
    .nav-droplet.dragging {
      border-color: rgba(154,211,255,.42) !important;
    }

    /* Unified shell alignment + flat matte bottom slider */
    :root {
      --app-shell-max: 736px;
      --app-shell-gutter: 12px;
    }

    .app-header,
    .bottom-nav {
      width: min(var(--app-shell-max), calc(100% - (var(--app-shell-gutter) * 2))) !important;
      left: 0 !important;
      right: 0 !important;
      margin-left: auto !important;
      margin-right: auto !important;
    }

    .app-content {
      max-width: 760px !important;
      padding-left: var(--app-shell-gutter) !important;
      padding-right: var(--app-shell-gutter) !important;
    }

    .nav-droplet,
    .nav-droplet.dragging {
      background: rgba(84, 132, 188, .42) !important;
      border: 0 !important;
      outline: 0 !important;
      box-shadow: none !important;
      filter: none !important;
      border-radius: 999px !important;
    }

    .bottom-nav button,
    .bottom-nav button.active,
    .bottom-nav button:hover,
    .bottom-nav button:focus-visible {
      border: 0 !important;
      outline: 0 !important;
      box-shadow: none !important;
      background: transparent !important;
    }

    .bottom-nav button.active {
      color: rgba(244,248,255,.98) !important;
    }

    @media (max-width: 520px) {
      :root { --app-shell-gutter: 9px; }
      .app-header,
      .bottom-nav {
        width: calc(100% - 18px) !important;
      }
    }

    /* Bottom navigation icons — solid 2D silhouettes without overlapping strokes. */
    .bottom-nav button svg.nav-icon {
      display: block;
      fill: currentColor !important;
      stroke: none !important;
      stroke-width: 0 !important;
      opacity: .72;
      filter: none !important;
      transform: none !important;
      transition: opacity .18s ease, color .18s ease !important;
      shape-rendering: geometricPrecision;
    }
    .bottom-nav button.active svg.nav-icon {
      fill: currentColor !important;
      stroke: none !important;
      opacity: 1;
      filter: none !important;
      transform: none !important;
    }

    /* Wypełnione ikony w górnym pasku — spójne z dolną nawigacją. */
    .app-header .login-btn .nav-icon,
    .app-header .players-btn .nav-icon {
      display: block;
      flex: 0 0 auto;
      color: currentColor;
      opacity: .92;
      filter: none !important;
    }
    .app-header .login-btn:hover .nav-icon,
    .app-header .players-btn:hover .nav-icon,
    .app-header .players-btn:focus-visible .nav-icon,
    .app-header .login-btn:focus-visible .nav-icon {
      opacity: 1;
    }

    /* Jeden wspólny punkt wejścia do logowania i zarządzania użytkownikami. */
    .profile-menu-btn {
      min-width: 0;
      max-width: 190px;
    }
    .profile-avatar {
      width: 25px;
      height: 25px;
      flex: 0 0 25px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
      font-size: 11px;
      line-height: 1;
      font-weight: 850;
      color: rgba(255,255,255,.96);
    }
    .profile-menu-btn.is-authenticated .profile-avatar {
      background: linear-gradient(145deg, rgba(93,188,255,.46), rgba(91,77,242,.38));
      border-color: rgba(174,220,255,.46);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.28), 0 4px 12px rgba(35,121,255,.16);
    }
    .profile-avatar .nav-icon {
      opacity: .96;
    }
    @media (max-width: 520px) {
      .profile-menu-btn {
        width: 38px !important;
        height: 38px !important;
        min-width: 38px !important;
        max-width: 38px !important;
        padding: 0 !important;
      }
      .profile-avatar {
        width: 27px;
        height: 27px;
        flex-basis: 27px;
      }
      .profile-button-label {
        display: none !important;
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       DRABINKA TURNIEJU
    ═══════════════════════════════════════════════════════════════ */
    .bracket-page {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .bracket-intro {
      padding: 18px;
      border-radius: var(--radius-lg);
      background: var(--glass-1);
      border: 1px solid var(--border-1);
    }
    .bracket-intro h2 {
      margin: 0 0 5px;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .bracket-intro p {
      margin: 0;
      color: var(--label-2);
      font-size: 12px;
      line-height: 1.45;
    }
    .bracket-section {
      border-radius: var(--radius-lg);
      background: var(--glass-1);
      border: 1px solid var(--border-1);
      padding: 14px;
      overflow: hidden;
    }
    .bracket-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .bracket-section-title h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
    }
    .bracket-section-title span {
      font-size: 10px;
      color: var(--label-3);
      white-space: nowrap;
    }
    .bracket-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 4px 2px 12px;
      scroll-snap-type: x proximity;
    }
    .bracket-board {
      position: relative;
      width: 930px;
      height: 618px;
      margin: 0 auto;
    }
    .bracket-board-unified {
      min-width: 1176px;
    }
    .bracket-connectors.bracket-connectors-unified {
      width: 1176px;
      height: 1120px;
    }
    .bracket-round-label {
      position: absolute;
      top: 0;
      width: 192px;
      text-align: center;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--label-2);
    }
    .bracket-third-place-label {
      position: absolute;
      width: 192px;
      text-align: center;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .045em;
      color: var(--label-2);
    }
    .bracket-connectors {
      position: absolute;
      left: 0;
      top: 40px;
      width: 930px;
      height: 560px;
      pointer-events: none;
      overflow: visible;
    }
    .bracket-connectors path {
      fill: none;
      stroke: rgba(174,203,238,.25);
      stroke-width: 1.25;
      stroke-linecap: square;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
      shape-rendering: geometricPrecision;
    }
    .bracket-match {
      position: absolute;
      width: 192px;
      height: 66px;
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,.085), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.14);
      overflow: hidden;
      color: var(--label-1);
    }
    .bracket-match.is-finished {
      border-color: rgba(255,255,255,.20);
    }
    .bracket-match-head {
      height: 19px;
      padding: 2px 8px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 8px;
      color: var(--label-3);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .bracket-team-row {
      height: 23px;
      padding: 2px 7px;
      display: grid;
      grid-template-columns: 18px minmax(0,1fr) 22px;
      align-items: center;
      gap: 6px;
      color: var(--label-2);
    }
    .bracket-team-row + .bracket-team-row {
      border-top: 1px solid rgba(255,255,255,.055);
    }
    .bracket-team-row.is-winner {
      color: var(--label-1);
      background: rgba(74,145,235,.12);
      font-weight: 750;
    }
    .bracket-team-row.is-loser {
      opacity: .55;
    }
    .bracket-team-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 10px;
    }
    .bracket-placeholder {
      color: var(--label-3);
      font-style: italic;
    }
    .bracket-score {
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      line-height: 1;
      color: inherit;
    }
    .bracket-finals-grid {
      display: grid;
      grid-template-columns: repeat(2,minmax(0,1fr));
      gap: 12px;
    }
    .bracket-final-card {
      position: relative;
      width: 100%;
      height: auto;
      min-height: 96px;
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(255,255,255,.09), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.15);
      overflow: hidden;
    }
    .bracket-final-card .bracket-match-head {
      height: 25px;
      padding: 4px 10px 0;
      font-size: 9px;
    }
    .bracket-final-card .bracket-team-row {
      height: 34px;
      grid-template-columns: 24px minmax(0,1fr) 28px;
      padding: 4px 10px;
    }
    .bracket-final-card .bracket-team-name { font-size: 12px; }
    .bracket-final-card .bracket-score { font-size: 20px; }
    .bracket-champion {
      margin-top: 12px;
      padding: 13px 14px;
      border-radius: 999px;
      text-align: center;
      background: rgba(238,190,72,.12);
      border: 1px solid rgba(238,190,72,.24);
      font-size: 12px;
      font-weight: 800;

    /* ══════════════════════════════════════════════════════
       SMOOTH SWITCH & NAV ANIMATIONS
    ══════════════════════════════════════════════════════ */

    /* ── Przełącznik motywu: sprężysty suwak ── */

    /* Wciśnięcie: zgniata kciuk */

    /* Ikona w kciuku: animacja pop-in przy zmianie motywu */
    @keyframes icon-swap-in {
      0%   { transform: scale(.30) rotate(-25deg); opacity: 0; }
      65%  { transform: scale(1.22) rotate(8deg);  opacity: 1; }
      100% { transform: scale(1)   rotate(0deg);   opacity: 1; }
    }

    /* Boczne ikony (słońce/księżyc w torze): pulsują gdy aktywne */

    /* Tor: subtelna zmiana blasku */

    /* ── Dolna nawigacja: sprężysta kropla ── */
    .nav-droplet {
      transition:
        left      .48s cubic-bezier(.34,1.56,.64,1),
        width     .48s cubic-bezier(.34,1.56,.64,1),
        transform .20s cubic-bezier(.34,1.56,.64,1) !important;
      will-change: left, width, transform;
    }
    .nav-droplet.dragging {
      transition: width .13s ease, transform .13s ease !important;
    }

    /* Squish: klasa dodawana przez JS na każde kliknięcie zakładki */
    @keyframes droplet-squish {
      0%   { transform: scale(1,    1); }
      22%  { transform: scale(.78,  1.14); }
      52%  { transform: scale(1.10, .92); }
      76%  { transform: scale(.97,  1.03); }
      100% { transform: scale(1,    1); }
    }
    .nav-droplet.squishing {
      animation: droplet-squish .46s cubic-bezier(.34,1.56,.64,1) both !important;
    }

    /* Aktywna ikona zakładki: sprężysty skok w górę */
    .bottom-nav button svg.nav-icon {
      transition: transform .32s cubic-bezier(.34,1.56,.64,1),
                  opacity   .20s ease !important;
      transform: scale(1) translateY(0) !important;
    }
    .bottom-nav button.active svg.nav-icon {
      transform: scale(1.20) translateY(-2px) !important;
    }

    /* Etykieta aktywnej zakładki: fade-in */
    .bottom-nav button .nav-label {
      transition: opacity .20s ease, color .20s ease !important;
    }
    .bottom-nav button:not(.active) .nav-label { opacity: .75 !important; }
    .bottom-nav button.active .nav-label { opacity: 1 !important; }

    /* Tap feedback na przyciskach nav */
    .bottom-nav button:not(.active):active {
      transform: scale(.86) !important;
      transition: transform .09s ease !important;
    }

// ═══════════════════════════════════════════════════════════════
//  FIREBASE STATE HOOK (zamiennik window.storage)
// ═══════════════════════════════════════════════════════════════
function useFirebaseState(path, defaultValue) {
  const [value, setValue] = useState(defaultValue);
  const [loaded, setLoaded] = useState(false);
  const valueRef = useRef(defaultValue);
  useEffect(() => {
    const ref = db.ref(path);
    const timeout = setTimeout(() => {
      console.warn('Firebase timeout for path:', path, '— using default');
      setLoaded(true);
    }, 8000);
    const handler = ref.on('value', snap => {
      clearTimeout(timeout);
      const data = snap.val();
      if (data !== null && data !== undefined) {
        valueRef.current = data;
        setValue(data);
      } else {
        valueRef.current = defaultValue;
        setValue(defaultValue);
      }
      setLoaded(true);
    }, err => {
      clearTimeout(timeout);
      console.error('Firebase read error:', path, err);
      setLoaded(true);
    });
    return () => {
      clearTimeout(timeout);
      ref.off('value', handler);
    };
  }, [path]);
  const updateValue = useCallback(async next => {
    const previous = valueRef.current;
    const resolved = typeof next === 'function' ? next(previous) : next;
    valueRef.current = resolved;
    setValue(resolved);
    try {
      await db.ref(path).set(resolved);
    } catch (e) {
      valueRef.current = previous;
      setValue(previous);
      console.error('Firebase write error:', path, e);
      throw e;
    }
  }, [path]);
  // Zapis pojedynczego klucza – nie nadpisuje całej kolekcji, więc
  // równoczesne zapisy z różnych urządzeń nie kasują się nawzajem.
  const writeChild = useCallback(async (childKey, childValue) => {
    const cur = valueRef.current;
    const base = cur && typeof cur === 'object' && !Array.isArray(cur) ? cur : {};
    const nextLocal = {
      ...base,
      [childKey]: childValue
    };
    valueRef.current = nextLocal;
    setValue(nextLocal);
    try {
      await db.ref(`${path}/${childKey}`).set(childValue);
    } catch (e) {
      valueRef.current = cur;
      setValue(cur);
      console.error('Firebase child write error:', path, childKey, e);
      throw e;
    }
  }, [path]);
  const removeChild = useCallback(async childKey => {
    const cur = valueRef.current;
    const base = cur && typeof cur === 'object' && !Array.isArray(cur) ? cur : {};
    const nextLocal = {
      ...base
    };
    delete nextLocal[childKey];
    valueRef.current = nextLocal;
    setValue(nextLocal);
    try {
      await db.ref(`${path}/${childKey}`).remove();
    } catch (e) {
      valueRef.current = cur;
      setValue(cur);
      console.error('Firebase child remove error:', path, childKey, e);
      throw e;
    }
  }, [path]);
  return [value, updateValue, loaded, writeChild, removeChild];
}

// ═══════════════════════════════════════════════════════════════
//  PUNKTACJA
// ═══════════════════════════════════════════════════════════════
function scoreGroupMatch(pred, result, points = POINTS) {
  if (!pred || !result) return 0;
  if (pred.home === result.home && pred.away === result.away) return points.group.exact;
  const po = pred.home > pred.away ? 'h' : pred.home < pred.away ? 'a' : 'd';
  const ro = result.home > result.away ? 'h' : result.home < result.away ? 'a' : 'd';
  return po === ro ? points.group.winner : 0;
}
function scoreKnockoutMatch(pred, result, points = POINTS) {
  if (!pred || !result) return 0;
  const exact = pred.home === result.home && pred.away === result.away;
  let predictedAdv = pred.home > pred.away ? 'home' : pred.home < pred.away ? 'away' : pred.penWinner || null;
  let base = exact ? points.knockout.exact : predictedAdv && predictedAdv === result.advancingTeam ? points.knockout.winner : 0;
  let bonus = result.pensHappened && pred.penWinner && pred.penWinner === result.advancingTeam ? points.knockout.penBonus : 0;
  return base + bonus;
}
function scoreMatch(pred, result, phase, points = POINTS) {
  return phase === 'group' ? scoreGroupMatch(pred, result, points) : scoreKnockoutMatch(pred, result, points);
}
function predictionQuality(pred, result, phase, points = POINTS) {
  if (!pred || !result) return null;
  const exact = pred.home === result.home && pred.away === result.away;
  if (exact) return 'exact';
  return scoreMatch(pred, result, phase, points) > 0 ? 'partial' : 'miss';
}
function scoreSpecials(special, results, points = POINTS) {
  if (!special || !results) return {
    groupOrders: 0,
    podium: 0,
    awards: 0,
    total: 0
  };
  let groupOrders = 0,
    podium = 0,
    awards = 0;
  GROUPS.forEach(g => {
    const p = special.groupOrders?.[g] || [],
      r = results.groupOrders?.[g] || [];
    if (!r.some(Boolean)) return;
    const exact = p.filter((t, i) => t && r[i] && t === r[i]).length;
    if (exact === 4) groupOrders += points.groupOrderAll;else if (exact === 2) groupOrders += points.groupOrderTwo;else if (exact === 1) groupOrders += points.groupOrderOne;
  });
  if (special.champion && results.champion && special.champion === results.champion) podium += points.champion;
  if (special.runnerUp && results.runnerUp && special.runnerUp === results.runnerUp) podium += points.runnerUp;
  if (special.third && results.third && special.third === results.third) podium += points.third;
  const n = s => (s || '').trim().toLowerCase();
  if (special.topScorer && results.topScorer && n(special.topScorer) === n(results.topScorer)) awards += points.topScorer;
  if (special.mvp && results.mvp && n(special.mvp) === n(results.mvp)) awards += points.mvp;
  return {
    groupOrders,
    podium,
    awards,
    total: groupOrders + podium + awards
  };
}

// Kolejność rozstrzygania remisów w klasyfikacji:
// 1) liczba dokładnych wyników, 2) punkty za TOP 3,
// 3) punkty za nagrody indywidualne, 4) punkty za miejsca w grupach.
function compareRankingEntries(a, b) {
  const value = (entry, key) => Number(entry?.[key]) || 0;
  const groupPoints = entry => Number(entry?.go ?? entry?.groupOrders ?? 0) || 0;
  const playerName = entry => String(entry?.player?.name || entry?.name || '');
  return value(b, 'total') - value(a, 'total') || value(b, 'exact') - value(a, 'exact') || value(b, 'podium') - value(a, 'podium') || value(b, 'awards') - value(a, 'awards') || groupPoints(b) - groupPoints(a) || playerName(a).localeCompare(playerName(b), 'pl', {
    sensitivity: 'base'
  });
}

function plMecze(n) {
  const a = Math.abs(n) % 100,
    b = a % 10;
  if (a === 1) return 'mecz';
  if (b >= 2 && b <= 4 && (a < 12 || a > 14)) return 'mecze';
  return 'meczów';
}
// Formatter tworzony RAZ (kosztowne) i reużywany przy każdym renderze karty.
const PL_DATE_FMT = (function () {
  try {
    return new Intl.DateTimeFormat('pl-PL', {
      timeZone: 'Europe/Warsaw',
      weekday: 'short',
      day: 'numeric',
      month: 'short',
      hour: '2-digit',
      minute: '2-digit',
      hour12: false
    });
  } catch (e) {
    return null;
  }
})();
function formatDate(iso) {
  // Zawsze wyświetlamy w czasie polskim (Europe/Warsaw, z poprawnym DST przez Intl).
  const d = new Date(iso);
  if (PL_DATE_FMT) {
    try {
      const parts = PL_DATE_FMT.formatToParts(d).reduce((a, {
        type,
        value
      }) => ({
        ...a,
        [type]: value
      }), {});
      return `${parts.weekday} ${parts.day} ${parts.month} • ${parts.hour}:${parts.minute}`;
    } catch (e) {}
  }
  // Fallback bez Intl – przybliżenie strefy Warszawy: CEST (UTC+2) latem, CET (UTC+1) zimą.

    const row = origin && origin.closest ? origin.closest(selector) : null;
    if (!row || row.scrollWidth <= row.clientWidth + 1) return;

    const hasHorizontalIntent = Math.abs(event.deltaX) > Math.abs(event.deltaY);
    const hasShiftWheelIntent = event.shiftKey && Math.abs(event.deltaY) > 0;

    if (!hasHorizontalIntent && !hasShiftWheelIntent) return;

    const delta = hasHorizontalIntent ? event.deltaX : event.deltaY;

    if (!delta) return;

    const maxScrollLeft = Math.max(0, row.scrollWidth - row.clientWidth);
    const canMoveLeft = delta < 0 && row.scrollLeft > 1;
    const canMoveRight = delta > 0 && row.scrollLeft < maxScrollLeft - 1;

    if (!canMoveLeft && !canMoveRight) return;

    event.preventDefault();
    row.scrollLeft = Math.max(
      0,
      Math.min(maxScrollLeft, row.scrollLeft + delta)
    );
  }, { passive: false });
})();
</script>



<script>
/* Automatycznie rozpoznaje, czy nazwy drużyn w panelu administratora
   zajmują jeden czy dwa wiersze. */
(function () {
  function updateAdminMatchAlignment() {
    document.querySelectorAll('.admin-panel .admin-match-summary-row').forEach(function (row) {
      var teams = row.querySelector('.admin-match-summary-teams');
      if (!teams) return;

      var rect = teams.getBoundingClientRect();
      var style = window.getComputedStyle(teams);
      var lineHeight = parseFloat(style.lineHeight);
      if (!Number.isFinite(lineHeight)) {
        lineHeight = parseFloat(style.fontSize) * 1.2 || 16;
      }

      var multiline = rect.height > lineHeight * 1.55;
      row.classList.toggle('is-multiline', multiline);
    });
  }

  var scheduled = false;
  function scheduleUpdate() {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(function () {
      scheduled = false;
      updateAdminMatchAlignment();
    });
  }

  window.addEventListener('load', scheduleUpdate);
  window.addEventListener('resize', scheduleUpdate);
  window.addEventListener('orientationchange', scheduleUpdate);

  if (window.ResizeObserver) {
    var resizeObserver = new ResizeObserver(scheduleUpdate);
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.admin-panel .admin-match-summary-teams')
        .forEach(function (el) { resizeObserver.observe(el); });
      scheduleUpdate();
    });
  }

  if (document.body) {
    new MutationObserver(function (mutations) {
      var shouldUpdate = mutations.some(function (mutation) {
        return mutation.type === 'childList' || mutation.type === 'characterData';
      });
      if (shouldUpdate) scheduleUpdate();
    }).observe(document.body, {
      childList: true,
      subtree: true,
      characterData: true
    });
  }

  scheduleUpdate();
})();
</script>





<script>
(function () {
  function update() {
    var header = document.querySelector('.app-header');
    if (!header) return;
    var h = header.getBoundingClientRect().height;
    document.documentElement.style.setProperty('--header-height', h + 'px');
  }
  function schedule() { requestAnimationFrame(update); }
  window.addEventListener('load', schedule);
  window.addEventListener('resize', schedule);
  window.addEventListener('orientationchange', schedule);
  var tries = 0;
  var interval = setInterval(function () {
    update();
    if (++tries >= 20) clearInterval(interval);
  }, 150);
})();
</script>
