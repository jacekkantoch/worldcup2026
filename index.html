    :root {

      /* iOS 26 System Backgrounds (dark) */
      --bg-0: #000000;

      --glass-2: linear-gradient(160deg, #2E2E30 0%, #262628 100%);
      --glass-3: linear-gradient(160deg, #3C3C3E 0%, #343436 100%);

      --border-2: rgba(255,255,255,0.13);
      --border-3: rgba(255,255,255,0.20);

      --hl2: inset 0 1px 0 rgba(255,255,255,0.15);
      /* Separators */

      /* iOS 26 System Labels (dark) */

      --label-2: rgba(235,235,245,0.60);
      --label-3: rgba(235,235,245,0.30);
      --label-4: rgba(235,235,245,0.16);

      --accent-green:  #30D158;

      --glass-3:
        radial-gradient(circle at 18% -12%, rgba(255,255,255,.26), transparent 42%),
        linear-gradient(145deg, rgba(255,255,255,.19), rgba(255,255,255,.075));
      --glass-4:
        radial-gradient(circle at 18% -12%, rgba(255,255,255,.30), transparent 42%),

      --border-1: rgba(255,255,255,.14);
      --border-2: rgba(255,255,255,.21);
      --border-3: rgba(255,255,255,.31);
      --hl: inset 0 1px 0 rgba(255,255,255,.17), inset 0 -1px 0 rgba(255,255,255,.025);
      --hl2: inset 0 1px 0 rgba(255,255,255,.24), inset 0 -1px 0 rgba(255,255,255,.04);
      --sep: rgba(255,255,255,.105);

      --label-1: rgba(255,255,255,.98);
      --label-2: rgba(235,241,255,.70);
      --label-3: rgba(228,236,255,.46);
      --label-4: rgba(228,236,255,.24);

      --accent: #70b8ff;
      --accent-strong: #0a84ff;

      --accent-yellow: #ffd75e;
      --accent-purple: #c67cff;
      --gold: #ffd75e;

      --shadow-sm: 0 8px 28px rgba(0,0,0,.24), 0 2px 7px rgba(0,0,0,.20);

      --shadow-lg: 0 28px 90px rgba(0,0,0,.50), 0 8px 24px rgba(0,0,0,.30);
      --shadow-glow: 0 0 0 1px rgba(255,255,255,.03), 0 16px 50px rgba(20,94,190,.14);

      --radius-sm: 22px;

    body {

        radial-gradient(ellipse 68% 46% at 108% 78%, rgba(168,88,255,.16), transparent 68%),
        linear-gradient(180deg, #07101d 0%, #070a12 48%, #04060b 100%);

    .pitch-bg {
      position: relative;
      isolation: isolate;
      min-height: 100vh;

    .pitch-bg::before,
    .pitch-bg::after {
      content: "";
      position: fixed;
      z-index: -1;
      pointer-events: none;
      border-radius: 999px;
      filter: blur(74px);
      opacity: .72;
      will-change: transform;

    .pitch-bg::before {
      width: min(62vw, 560px);
      height: min(62vw, 560px);
      left: -18vw;
      top: 21vh;
      background: radial-gradient(circle at 65% 35%, rgba(52,199,255,.30), rgba(10,132,255,.10) 45%, transparent 72%);
      animation: liquidFloatA 18s ease-in-out infinite alternate;

    .pitch-bg::after {
      width: min(70vw, 650px);
      height: min(70vw, 650px);
      right: -25vw;
      bottom: 4vh;
      background: radial-gradient(circle at 34% 40%, rgba(191,90,242,.25), rgba(48,209,88,.08) 48%, transparent 73%);
      animation: liquidFloatB 22s ease-in-out infinite alternate;

    @keyframes liquidFloatA {
      from { transform: translate3d(-2%, -2%, 0) scale(.96); }
      to   { transform: translate3d(13%, 10%, 0) scale(1.08); }
    }
    @keyframes liquidFloatB {
      from { transform: translate3d(4%, 5%, 0) scale(1.02); }
      to   { transform: translate3d(-11%, -9%, 0) scale(.94); }
    }

    /* Floating liquid tab bar */
    .bottom-nav {
      left: 10px;

      bottom: calc(5px + var(--safe-bottom));

      border: 1px solid rgba(255,255,255,.20);
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% -30%, rgba(255,255,255,.22), transparent 44%),

    }
    .nav-track {
      padding: 7px;
      gap: 2px;
      isolation: isolate;
    }
    .nav-droplet {
      top: 7px;
      bottom: 7px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 28% 0%, rgba(255,255,255,.38), transparent 42%),
        linear-gradient(145deg, rgba(82,178,255,.39), rgba(35,105,248,.25) 58%, rgba(133,82,245,.18));
      border: 1px solid rgba(158,216,255,.55);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.38),
        inset 0 -1px 0 rgba(255,255,255,.07),
        0 7px 20px rgba(28,112,255,.22),
        0 0 0 1px rgba(77,160,255,.08);
      will-change: left, width, transform;
      transform: translateZ(0);
    }
    .nav-droplet.dragging {
      transform: translateZ(0) scale(1.025);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.42),
        inset 0 -1px 0 rgba(255,255,255,.08),
        0 10px 27px rgba(28,112,255,.29),
        0 0 0 1px rgba(77,160,255,.12);
    }
    .bottom-nav button {
      min-height: 58px;
      padding: 8px 2px 7px;
      color: rgba(226,235,255,.45);
      border-radius: 999px;
      background: transparent !important;
      overflow: hidden;
      text-shadow: none;
      transition: color .22s var(--ease-out), transform .16s var(--ease-spring), opacity .22s ease !important;

    .bottom-nav button:hover,

    .bottom-nav button.active {

    /* ═══════════════════════════════════════════════════════════════
       FULL MOBILE VIEWPORT BACKGROUND · iOS Safari / PWA
       One fixed surface is kept above the document canvas and below
       the application, so safe areas and Safari viewport changes never
       expose a differently coloured strip.
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --app-viewport-height: 100dvh;
      --app-screen-background:
        radial-gradient(ellipse 100% 58% at 50% -13%, rgba(44,139,255,.28), transparent 62%),
        radial-gradient(ellipse 66% 46% at -8% 68%, rgba(44,214,155,.13), transparent 69%),
        radial-gradient(ellipse 68% 46% at 108% 78%, rgba(168,88,255,.16), transparent 68%),
        linear-gradient(180deg, #07101d 0%, #070a12 48%, #04060b 100%);
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background-color: #07101d !important;
    }

    html {
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      background-image: var(--app-screen-background) !important;
      background-repeat: no-repeat !important;
      background-position: center top !important;
      background-size: 100% var(--app-viewport-height) !important;
      background-attachment: fixed !important;
    }

    body {
      position: relative;
      isolation: isolate;
      min-height: 100vh !important;
      min-height: 100svh !important;
      min-height: var(--app-viewport-height) !important;
      background-image: var(--app-screen-background) !important;
      background-repeat: no-repeat !important;
      background-position: center top !important;
      background-size: 100% var(--app-viewport-height) !important;
      background-attachment: fixed !important;
    }

    body::before {
      content: "";
      position: fixed;
      z-index: 0;
      pointer-events: none;
      left: 0;
      top: 0;
      width: 100vw;
      height: var(--app-viewport-height);
      min-height: 100svh;
      background-color: #07101d;
      background-image: var(--app-screen-background);
      background-repeat: no-repeat;
      background-position: center top;
      background-size: 100% 100%;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }

    #loading,
    #root {
      position: relative;
      z-index: 1;
      min-height: 100vh !important;
      min-height: 100svh !important;
      min-height: var(--app-viewport-height) !important;
      background: transparent !important;
    }

    .pitch-bg {
      min-height: 100vh !important;
      min-height: 100svh !important;
      min-height: var(--app-viewport-height) !important;
      background: transparent !important;
    }

    @supports (height: 100lvh) {
      html,
      body,
      #root,
      .pitch-bg {
        min-height: max(100dvh, var(--app-viewport-height)) !important;
      }
    }

    @supports (-webkit-touch-callout: none) {
      html,
      body,
      #root,
      .pitch-bg {
        min-height: -webkit-fill-available;
      }
      body::before {
        min-height: var(--app-viewport-height);
      }
    }

    @media (display-mode: standalone) {
      body::before {
        top: calc(-1 * var(--safe-top));
        height: calc(var(--app-viewport-height) + var(--safe-top) + var(--safe-bottom));
      }
    }

    /* ══════════════════════════════════════════════════════
       SMOOTH SWITCH & NAV ANIMATIONS
    ══════════════════════════════════════════════════════ */

    /* ── Przełącznik motywu: sprężysty suwak ── */
    .theme-switch-thumb {
      transition:
        transform  .46s cubic-bezier(.34,1.56,.64,1),
        background .30s ease,
        box-shadow .30s ease !important;
      will-change: transform;
    }

    /* Wciśnięcie: zgniata kciuk */
    .theme-toggle-btn.theme-switch:active .theme-switch-thumb {
      transition: transform .10s ease !important;
    }
    .theme-toggle-btn.theme-switch:active.is-dark .theme-switch-thumb {
      transform: translateX(0) scale(.80) !important;
    }
    .theme-toggle-btn.theme-switch:active.is-light .theme-switch-thumb {
      transform: translateX(38px) scale(.80) !important;
    }
    @media (max-width: 420px) {
      .theme-toggle-btn.theme-switch:active.is-light .theme-switch-thumb {
        transform: translateX(36px) scale(.80) !important;
      }
    }

    /* Ikona w kciuku: animacja pop-in przy zmianie motywu */
    @keyframes icon-swap-in {
      0%   { transform: scale(.30) rotate(-25deg); opacity: 0; }
      65%  { transform: scale(1.22) rotate(8deg);  opacity: 1; }
      100% { transform: scale(1)   rotate(0deg);   opacity: 1; }
    }
    .theme-switch.is-dark  .theme-switch-thumb svg {
      animation: icon-swap-in .42s cubic-bezier(.34,1.56,.64,1) both;
    }
    .theme-switch.is-light .theme-switch-thumb svg {
      animation: icon-swap-in .42s cubic-bezier(.34,1.56,.64,1) both;
    }

    /* Boczne ikony (słońce/księżyc w torze): pulsują gdy aktywne */
    .theme-switch-icon {
      transition: color .22s ease, opacity .22s ease, transform .26s cubic-bezier(.34,1.56,.64,1) !important;
    }
    .theme-switch.is-dark  .theme-switch-icon-moon {
      transform: translateY(-50%) scale(1.22) !important;
    }
    .theme-switch.is-light .theme-switch-icon-sun {
      transform: translateY(-50%) scale(1.22) !important;
    }
    .theme-switch.is-dark  .theme-switch-icon-sun  {
      transform: translateY(-50%) scale(.85) !important;
    }
    .theme-switch.is-light .theme-switch-icon-moon {
      transform: translateY(-50%) scale(.85) !important;
    }

    /* Tor: subtelna zmiana blasku */
    .theme-toggle-btn.theme-switch {
      transition: background .30s ease, border-color .30s ease,
                  box-shadow .30s ease, opacity .12s ease !important;
    }

    /* ── Dolna nawigacja: sprężysta kropla ── */
    .nav-droplet {
      transition:
        left      .48s cubic-bezier(.34,1.56,.64,1),
        width     .48s cubic-bezier(.34,1.56,.64,1),
        transform .20s cubic-bezier(.34,1.56,.64,1) !important;
      will-change: left, width, transform;
    }
    .nav-droplet.dragging {
      transition: width .13s ease, transform .13s ease !important;
    }

    /* Squish: klasa dodawana przez JS na każde kliknięcie zakładki */
    @keyframes droplet-squish {
      0%   { transform: scale(1,    1); }
      22%  { transform: scale(.78,  1.14); }
      52%  { transform: scale(1.10, .92); }
      76%  { transform: scale(.97,  1.03); }
      100% { transform: scale(1,    1); }
    }
    .nav-droplet.squishing {
      animation: droplet-squish .46s cubic-bezier(.34,1.56,.64,1) both !important;
    }

    /* Aktywna ikona zakładki: sprężysty skok w górę */
    .bottom-nav button svg.nav-icon {
      transition: transform .32s cubic-bezier(.34,1.56,.64,1),
                  opacity   .20s ease !important;
      transform: scale(1) translateY(0) !important;
    }
    .bottom-nav button.active svg.nav-icon {
      transform: scale(1.20) translateY(-2px) !important;
    }

    /* Etykieta aktywnej zakładki: fade-in */
    .bottom-nav button .nav-label {
      transition: opacity .20s ease, color .20s ease !important;
    }
    .bottom-nav button:not(.active) .nav-label { opacity: .75 !important; }
    .bottom-nav button.active .nav-label { opacity: 1 !important; }

    /* Tap feedback na przyciskach nav */
    .bottom-nav button:not(.active):active {
      transform: scale(.86) !important;
      transition: transform .09s ease !important;
    }


    /* ═══════════════════════════════════════════════════════════════
       EDGE-TO-EDGE VIEWPORT FIX · iOS Safari + installed PWA
       Uses the real visible viewport height, removes doubled body
       padding and leaves scroll space above the floating navigation.
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --app-viewport-height: 100dvh;
      --app-viewport-top: 0px;
      --app-viewport-bottom: 0px;
      --app-browser-bottom-space: max(env(safe-area-inset-bottom, 0px), var(--app-viewport-bottom));
    }

    html {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      width: 100%;
      min-height: var(--app-viewport-height) !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow-x: hidden;
    }

    #loading,
    #root,
    #root > .pitch-bg,
    .pitch-bg {
      min-height: var(--app-viewport-height) !important;
    }

    /* Override the earlier max(100dvh, …) rule. On iOS it can select
       the larger layout viewport and make the bottom appear clipped. */
    @supports (height: 100dvh) {
      html,
      body,
      #loading,
      #root,
      #root > .pitch-bg,
      .pitch-bg {
        min-height: var(--app-viewport-height) !important;
      }
    }

    body::before {
      top: 0 !important;
      bottom: auto !important;
      width: 100% !important;
      height: var(--app-viewport-height) !important;
      min-height: var(--app-viewport-height) !important;
    }

    /* The last card can always be scrolled completely above the
       floating bottom bar, including the iPhone home-indicator inset. */
    .app-content {
      padding-bottom: calc(124px + var(--app-browser-bottom-space)) !important;
    }

    /* In normal Safari the browser already excludes its own toolbars
       from the visual viewport, so do not add the standalone insets. */
    html:not(.is-standalone) .app-header {
      top: 7px !important;
      margin-top: 7px !important;
    }
    html:not(.is-standalone) .filters-sticky {
      top: 78px !important;
    }
    html:not(.is-standalone) .bottom-nav {
      bottom: 3px !important;
    }

    /* Installed PWA: draw edge-to-edge, while keeping controls clear
       of the Dynamic Island/status bar and home indicator. */
    html.is-standalone .app-header {
      top: calc(env(safe-area-inset-top, 0px) + 7px) !important;
      margin-top: calc(env(safe-area-inset-top, 0px) + 7px) !important;
    }
    html.is-standalone .filters-sticky {
      top: calc(env(safe-area-inset-top, 0px) + 88px) !important;
    }
    html.is-standalone .bottom-nav {
      bottom: calc(env(safe-area-inset-bottom, 0px) + 7px) !important;
    }
    html.is-standalone .app-content {
      padding-bottom: calc(124px + max(env(safe-area-inset-bottom, 0px), 20px)) !important;
    }

    @media (display-mode: standalone) {
      .app-header {
        top: calc(env(safe-area-inset-top, 0px) + 7px) !important;
        margin-top: calc(env(safe-area-inset-top, 0px) + 7px) !important;
      }
      .filters-sticky {
        top: calc(env(safe-area-inset-top, 0px) + 88px) !important;
      }
      .bottom-nav {
        bottom: calc(env(safe-area-inset-bottom, 0px) + 7px) !important;
      }
      .app-content {
        padding-bottom: calc(124px + max(env(safe-area-inset-bottom, 0px), 20px)) !important;
      }
    }


    /* ═══════════════════════════════════════════════════════════════
       SOFT OVERFLOW FADE
       Zamiast wielokropka lub ostrego ucięcia tekst łagodnie zanika.
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --overflow-fade: clamp(16px, 5vw, 30px);
      --overflow-fade-small: clamp(10px, 3.5vw, 20px);
    }

    /* Elementy wyrównane do lewej — zanikanie przy prawej krawędzi. */
    .truncate,
    .app-header .title-group h1,
    .app-header .title-group small,
    .mine-team-name,
    .admin-match-summary-teams,
    .bracket-team-name,
    .compare-view .compare-player-name,
    .prediction-player-name,
    .leaderboard-player-name,
    .leaderboard-stats .rank-stat {
      text-overflow: clip !important;
      -webkit-mask-image: linear-gradient(
        to right,
        #000 0,
        #000 calc(100% - var(--overflow-fade)),
        transparent 100%
      );
      mask-image: linear-gradient(
        to right,
        #000 0,
        #000 calc(100% - var(--overflow-fade)),
        transparent 100%
      );
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
    }

    /* Wyśrodkowane etykiety — delikatne zanikanie po obu stronach. */
    .bottom-nav .nav-label,
    .admin-score-team-name {
      text-overflow: clip !important;
      -webkit-mask-image: linear-gradient(
        to right,
        transparent 0,
        #000 var(--overflow-fade-small),
        #000 calc(100% - var(--overflow-fade-small)),
        transparent 100%
      );
      mask-image: linear-gradient(
        to right,
        transparent 0,
        #000 var(--overflow-fade-small),
        #000 calc(100% - var(--overflow-fade-small)),
        transparent 100%
      );
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
    }

    /* Poziome rzędy przewijane również sugerują dalszą zawartość zanikiem. */
    .chip-scroll-row {
      -webkit-mask-image: linear-gradient(
        to right,
        #000 0,
        #000 calc(100% - var(--overflow-fade)),
        transparent 100%
      );
      mask-image: linear-gradient(
        to right,
        #000 0,
        #000 calc(100% - var(--overflow-fade)),
        transparent 100%
      );
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
      padding-right: calc(var(--overflow-fade) + 4px);
    }


    /* Nagłówek aplikacji: pełny tytuł w dwóch widocznych wierszach */
    .app-header .title-group {
      flex: 1 1 auto;
      min-width: 0;
      overflow: visible !important;
    }
    .app-header .title-group h1,
    .app-header .title-group small {
      display: block !important;
      width: auto;
      max-width: none !important;
      overflow: visible !important;
      text-overflow: clip !important;
      white-space: nowrap !important;
      -webkit-mask-image: none !important;
      mask-image: none !important;
    }
    .app-header .title-group h1 {
      font-size: 15px !important;
      line-height: 1.02 !important;
      letter-spacing: .025em !important;
    }

    /* CUP 2026 ma dokładnie ten sam kolor co FIFA WORLD. */
    .app-header .title-group h1,
    .app-header .title-group small {
      color: var(--label-1) !important;

    /* W kafelkach wyboru drużyn pokazujemy pełne nazwy bez zanikania,
       wielokropka ani ostrego obcięcia. Tekst może przejść do drugiej linii. */
    .selection-tile .truncate,
    .selection-tile.truncate {
      overflow: visible !important;
      text-overflow: clip !important;
      white-space: normal !important;
      overflow-wrap: anywhere;
      line-height: 1.15 !important;
      -webkit-mask-image: none !important;
      mask-image: none !important;
    }

    /* Ranking: bez zanikania nazw i statystyk. Wiersze mogą się zawijać,

    /* Poziome listy mają miękkie, symetryczne krawędzie z lewej i prawej.
       Dodatkowy wewnętrzny odstęp zapobiega wchodzeniu pierwszego elementu
       bezpośrednio w strefę zanikania. */
    :root {
      --horizontal-edge-fade: clamp(16px, 4vw, 26px);
    }

    .chip-scroll-row,
    .pill-scroll-safe,
    .filters-sticky .overflow-x-auto {
      padding-left: calc(var(--horizontal-edge-fade) + 3px) !important;
      padding-right: calc(var(--horizontal-edge-fade) + 3px) !important;
      scroll-padding-left: calc(var(--horizontal-edge-fade) + 3px);
      scroll-padding-right: calc(var(--horizontal-edge-fade) + 3px);
      -webkit-mask-image: linear-gradient(
        to right,
        transparent 0,
        #000 var(--horizontal-edge-fade),
        #000 calc(100% - var(--horizontal-edge-fade)),
        transparent 100%
      ) !important;
      mask-image: linear-gradient(
        to right,
        transparent 0,
        #000 var(--horizontal-edge-fade),
        #000 calc(100% - var(--horizontal-edge-fade)),
        transparent 100%
      ) !important;
      -webkit-mask-repeat: no-repeat !important;
      mask-repeat: no-repeat !important;
      -webkit-mask-size: 100% 100% !important;
      mask-size: 100% 100% !important;
    }

    /* Przywrócenie normalnego pionowego przewijania kółkiem myszy
       i gładzikiem w przeglądarkach komputerowych. */
    html {
      overflow-y: auto !important;
      overscroll-behavior-y: auto !important;
      scroll-behavior: auto;
    }

    #root > .pitch-bg,

      overscroll-behavior-y: auto !important;

    .app-header {

    /* ═══════════════════════════════════════════════════════════════

       Jasny motyw wcześniej przywracał position: sticky, przez co

    ═══════════════════════════════════════════════════════════════ */
    html[data-theme="light"] .app-header {
      position: fixed !important;

      left: 50% !important;
      right: auto !important;
      width: min(760px, calc(100% - 20px)) !important;
      min-height: 64px !important;
      margin: 0 !important;
      transform: translateX(-50%) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      visibility: visible !important;
      opacity: 1 !important;
      z-index: 70 !important;
    }

    html[data-theme="light"] .app-header .logo {
      display: flex !important;
      flex: 1 1 auto !important;
      align-items: center !important;
      min-width: 0 !important;
      visibility: visible !important;
      opacity: 1 !important;

    html[data-theme="light"] .app-header .logo-icon,
    html[data-theme="light"] .app-header .title-group,

    html[data-theme="light"] .app-header .title-group small {

      opacity: 1 !important;

    html[data-theme="light"] .app-header .title-group h1,

    html[data-theme="light"] .app-content {
      padding-top: 96px !important;
    }

    html[data-theme="light"] .filters-sticky {
      position: sticky !important;
      top: 86px !important;
      z-index: 20 !important;

    html[data-theme="light"].is-standalone .app-header {

    }

    html[data-theme="light"].is-standalone .app-content {
      padding-top: calc(96px + env(safe-area-inset-top, 0px)) !important;
    }

    html[data-theme="light"].is-standalone .filters-sticky {
      top: calc(env(safe-area-inset-top, 0px) + 86px) !important;
    }

    @media (display-mode: standalone) {
      html[data-theme="light"] .app-header {
        top: calc(env(safe-area-inset-top, 0px) + 7px) !important;

        top: calc(env(safe-area-inset-top, 0px) + 80px) !important;

    /* ═══════════════════════════════════════════════════════════════
       JEDNOLITE ZAOKRĄGLENIA
       Wszystkie elementy mają bazowo 30 px. Przy elementach niższych
       lub węższych przeglądarka automatycznie ogranicza promień do
       połowy wymiaru, dzięki czemu powstaje pełna kapsułka lub okrąg.
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --radius-sm: 30px !important;
      --radius-md: 30px !important;
      --radius-lg: 30px !important;
      --radius-xl: 30px !important;
      --unified-radius: 30px;
    }

    .app-header,
    .bottom-nav,
    .nav-droplet,
    .filters-sticky,
    .glass,
    .glass-strong,
    .install-banner,
    .match-card,
    .admin-match-card,
    .leaderboard-card,
    .leaderboard-header,
    .leaderboard-category-card,
    .compare-match-card,
    .selection-tile,
    .login-modal-sheet,
    .login-modal-compact-sheet,
    .login-btn,
    .players-btn,
    .theme-toggle-btn,
    .match-points-badge,
    input,
    select,
    textarea,
    button,
    [role="button"],
    .rounded,
    .rounded-sm,
    .rounded-md,
    .rounded-lg,
    .rounded-xl,
    .rounded-2xl,
    .rounded-3xl,
    .rounded-full,
    [class*="rounded-"],
    [class~="rounded"] {
      border-radius: var(--unified-radius) !important;
    }

    /* Elementy z osobno ustawionymi narożnikami również korzystają z 30 px. */
    .rounded-t,
    .rounded-b,
    .rounded-l,
    .rounded-r,
    .rounded-tl,
    .rounded-tr,
    .rounded-bl,
    .rounded-br,
    [class*="rounded-t-"],
    [class*="rounded-b-"],
    [class*="rounded-l-"],
    [class*="rounded-r-"],
    [class*="rounded-tl-"],
    [class*="rounded-tr-"],
    [class*="rounded-bl-"],
    [class*="rounded-br-"] {
      border-radius: var(--unified-radius) !important;
    }

    /* Małe kwadraty, ikonki i kapsułki pozostają w pełni zaokrąglone.
       999 px daje ten sam efekt co połowa ich wymiaru. */
    .logo-icon,
    .players-btn,
    .theme-toggle-btn,
    .match-points-badge,
    .nav-droplet,
    .rounded-full,
    [aria-label*="Zamknij"],

    /* Ostateczne wymuszenie stałego nagłówka w obu motywach,
       także po zmianie motywu bez przeładowania strony. */

    html[data-theme="light"] body .app-header,

      -webkit-mask-image: linear-gradient(
        to right,
        transparent 0,
        #000 12px,
        #000 calc(100% - 12px),
        transparent 100%
      ) !important;

        to right,
        transparent 0,

    ═══════════════════════════════════════════════════════════════ */

<script>
/* Obsługa kółka myszy / gładzika dla poziomo przewijanych filtrów.
   Gdy lista może przesunąć się w danym kierunku, pionowy ruch kółka
   przewija ją poziomo. Po dojściu do końca zwykłe przewijanie strony
   automatycznie działa dalej. */
(function () {
  const selector = [
    '.chip-scroll-row',
    '.pill-scroll-safe',
    '.filters-sticky .overflow-x-auto'
  ].join(',');

  document.addEventListener('wheel', function (event) {
    const origin = event.target;
    const row = origin && origin.closest ? origin.closest(selector) : null;
    if (!row || row.scrollWidth <= row.clientWidth + 1) return;

    const delta = Math.abs(event.deltaX) > Math.abs(event.deltaY)
      ? event.deltaX
      : event.deltaY;

    if (!delta) return;

    const maxScrollLeft = Math.max(0, row.scrollWidth - row.clientWidth);
    const canMoveLeft = delta < 0 && row.scrollLeft > 1;
    const canMoveRight = delta > 0 && row.scrollLeft < maxScrollLeft - 1;

    if (!canMoveLeft && !canMoveRight) return;

    event.preventDefault();
    row.scrollLeft = Math.max(
      0,
      Math.min(maxScrollLeft, row.scrollLeft + delta)
    );
  }, { passive: false });
})();
</script>


<script>
/* Safari/iOS potrafi po zmianie motywu ponownie przeliczyć pozycję
   elementu z backdrop-filter. Wymuszamy fixed także bez przeładowania. */
(function () {
  function pinAppHeader() {
    var header = document.querySelector('.app-header');
    if (!header) return false;

    header.style.setProperty('position', 'fixed', 'important');
    header.style.setProperty('top', 'calc(env(safe-area-inset-top, 0px) + 7px)', 'important');
    header.style.setProperty('left', '50%', 'important');
    header.style.setProperty('right', 'auto', 'important');
    header.style.setProperty('margin', '0', 'important');
    header.style.setProperty('transform', 'translate3d(-50%, 0, 0)', 'important');
    header.style.setProperty('-webkit-transform', 'translate3d(-50%, 0, 0)', 'important');
    header.style.setProperty('z-index', '1000', 'important');

    var height = Math.ceil(header.getBoundingClientRect().height || 64);
    document.documentElement.style.setProperty(
      '--fixed-header-content-offset',
      'calc(' + (height + 24) + 'px + env(safe-area-inset-top, 0px))'
    );
    document.documentElement.style.setProperty(
      '--fixed-header-filter-offset',
      'calc(' + (height + 14) + 'px + env(safe-area-inset-top, 0px))'
    );
    return true;
  }

  function schedulePin() {
    requestAnimationFrame(function () {
      if (!pinAppHeader()) {
        setTimeout(pinAppHeader, 80);
      }
    });
  }

  schedulePin();
  window.addEventListener('load', schedulePin, { once: true });
  window.addEventListener('resize', schedulePin);
  window.addEventListener('orientationchange', schedulePin);

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', schedulePin);
  }

  new MutationObserver(schedulePin).observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['data-theme', 'class']
  });

  new MutationObserver(function () {
    if (!document.querySelector('.app-header')) schedulePin();
    else pinAppHeader();
  }).observe(document.body, { childList: true, subtree: true });
})();
</script>


<script>
/* Automatycznie rozpoznaje, czy nazwy drużyn w panelu administratora
   zajmują jeden czy dwa wiersze. */
(function () {
  function updateAdminMatchAlignment() {
    document.querySelectorAll('.admin-panel .admin-match-summary-row').forEach(function (row) {
      var teams = row.querySelector('.admin-match-summary-teams');
      if (!teams) return;

      var rect = teams.getBoundingClientRect();
      var style = window.getComputedStyle(teams);
      var lineHeight = parseFloat(style.lineHeight);
      if (!Number.isFinite(lineHeight)) {
        lineHeight = parseFloat(style.fontSize) * 1.2 || 16;
      }

      var multiline = rect.height > lineHeight * 1.55;
      row.classList.toggle('is-multiline', multiline);
    });
  }

  var scheduled = false;
  function scheduleUpdate() {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(function () {
      scheduled = false;
      updateAdminMatchAlignment();
    });
  }

  window.addEventListener('load', scheduleUpdate);
  window.addEventListener('resize', scheduleUpdate);
  window.addEventListener('orientationchange', scheduleUpdate);

  if (window.ResizeObserver) {
    var resizeObserver = new ResizeObserver(scheduleUpdate);
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.admin-panel .admin-match-summary-teams')
        .forEach(function (el) { resizeObserver.observe(el); });

    });
  }

  new MutationObserver(function (mutations) {
    var shouldUpdate = mutations.some(function (mutation) {
      return mutation.type === 'childList' || mutation.type === 'characterData';
    });
    if (shouldUpdate) scheduleUpdate();
  }).observe(document.body, {
    childList: true,
    subtree: true,
    characterData: true
  });

  scheduleUpdate();
})();
</script>
