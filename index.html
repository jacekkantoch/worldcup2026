        <PhaseLockPanel matches={matches} phaseLocks={phaseLocks||{}} onSavePhaseLocks={onSavePhaseLocks}/>
      )}

      {tab==='results'&&(
        <div className="space-y-2">
          <div className="bg-white border border-stone-200 rounded-xl p-3 space-y-2">
            <div className="relative"><Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400"/>
              <input value={matchSearch} onChange={e=>setMatchSearch(e.target.value)} placeholder="Szukaj drużyny / numeru (M5)" className="w-full pl-9 pr-3 py-2 border border-stone-200 rounded-lg focus:border-[#0d1b5e] focus:outline-none text-sm"/>
            </div>
            <div className="flex gap-1 overflow-x-auto">
              {[{k:'all',l:'Wszystkie'},{k:'group',l:'Grupowa'},{k:'r32',l:'1/16'},{k:'r16',l:'1/8'},{k:'qf',l:'1/4'},{k:'sf',l:'1/2'},{k:'third',l:'3.'},{k:'final',l:'Finał'}].map(t=>(
                <button key={t.k} onClick={()=>{setMPhase(t.k);scrollAppToTop();}} className={`selection-tile${mPhase===t.k?' is-selected':''} shrink-0 px-2.5 py-1 rounded-lg text-xs font-semibold`}>{t.l}</button>
              ))}
            </div>
          </div>
          {filteredMatches.map(m=>(
            <AdminMatchRow key={m.id} match={m} teams={teams} teamOptions={teamOptions} result={results[m.id]}
              editing={editingId===m.id} onToggleEdit={()=>setEditingId(editingId===m.id?null:m.id)}
              onSave={payload=>{onSaveResult(m.id,payload);setEditingId(null);}}
              onDelete={()=>onDeleteResult(m.id)}
              onUpdateMatchTeams={(hId,aId)=>onUpdateTeam(m.id,hId,aId)}/>
          ))}
        </div>
      )}

      {tab==='teams'&&(
        <div className="space-y-3">
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-900">Wpisz nazwę drużyny oraz dwuliterowy kod kraju, np. pl, de lub fr.</div>
          {GROUPS.map(g=>(
            <div key={g} className="bg-white border border-stone-200 rounded-xl p-3">
              <h4 className="font-display text-lg mb-2">Grupa {g}</h4>
              <div className="space-y-1.5">
                {[1,2,3,4].map(i=>{const t=teams[`${g}${i}`];return t?<AdminTeamRow key={t.id} team={t} onSave={(name,flag)=>onUpdateTeam(t.id,name,flag)}/>:null;})}
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==='specials'&&(
        <div className="space-y-3">
          <div className="bg-white border border-stone-200 rounded-xl p-4">
            <h4 className="font-display text-base mb-2">Kolejność w grupach</h4>
            <div className="flex gap-1 overflow-x-auto pb-2 mb-3">
              {GROUPS.map(g=><button key={g} onClick={()=>{setSpGroup(g);scrollAppToTop();}} className={`selection-tile${spGroup===g?' is-selected':''} shrink-0 w-9 h-9 rounded-lg font-bold`}>{g}</button>)}
            </div>
            {[0,1,2,3].map(pos=>{
              const gTeams=Object.values(teams).filter(t=>t&&t.group===spGroup);
              return <div key={pos} className="mb-2">
                <label className="text-xs font-bold text-stone-700">{['1.','2.','3.','4.'][pos]} miejsce</label>
                <div className="grid grid-cols-2 gap-1 mt-1">
                  {gTeams.map(t=>{
                    const sel=spDraft.groupOrders?.[spGroup]?.[pos]===t.id;
                    return <button key={t.id} onClick={()=>setSpDraft(d=>{const o=[...(d.groupOrders?.[spGroup]||[null,null,null,null])];for(let i=0;i<4;i++)if(o[i]===t.id)o[i]=null;o[pos]=t.id;return{...d,groupOrders:{...d.groupOrders,[spGroup]:o}};})}
                      className={`selection-tile${sel?' is-selected':''} px-2 py-1.5 rounded-lg text-xs font-semibold border inline-flex items-center gap-2 justify-start min-w-0`}><FlagImg code={t.flag} size={16} title={t.name}/><span className="min-w-0 truncate">{t.name}</span></button>;
                  })}
                </div>
              </div>;
            })}
          </div>

          <div className="bg-white border border-stone-200 rounded-xl p-4 space-y-2">
            <h4 className="font-display text-base mb-2">Podium</h4>
            {[{k:'champion',l:'Zwycięzca'},{k:'runnerUp',l:'2. miejsce'},{k:'third',l:'3. miejsce'}].map(item=>(
              <div key={item.k}>
                <label className="text-xs font-semibold text-stone-700">{item.l}</label>
                <select value={spDraft[item.k]||''} onChange={e=>setSpDraft(d=>({...d,[item.k]:e.target.value}))}
                  className="w-full px-3 py-2 mt-1 border border-stone-200 rounded-lg text-sm bg-white">
                  <option value="">—</option>
                  {Object.values(teams).sort((a,b)=>a.name.localeCompare(b.name)).map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                </select>
              </div>
            ))}
          </div>

          <div className="bg-white border border-stone-200 rounded-xl p-4 space-y-2">
            <h4 className="font-display text-base mb-2">Nagrody indywidualne</h4>
            <div><label className="text-xs font-semibold text-stone-700">Król strzelców</label>
              <input value={spDraft.topScorer||''} onChange={e=>setSpDraft(d=>({...d,topScorer:e.target.value}))} placeholder="np. Kylian Mbappé" className="w-full px-3 py-2 mt-1 border border-stone-200 rounded-lg text-sm"/></div>
            <div><label className="text-xs font-semibold text-stone-700">MVP</label>
              <input value={spDraft.mvp||''} onChange={e=>setSpDraft(d=>({...d,mvp:e.target.value}))} placeholder="np. Jude Bellingham" className="w-full px-3 py-2 mt-1 border border-stone-200 rounded-lg text-sm"/></div>
          </div>

          <Btn variant="primary" size="lg" onClick={()=>onSaveSpecialResults(spDraft)} className="w-full"><Icon name="save" size={16}/>Zapisz wyniki specjalne</Btn>
        </div>
      )}


      {tab==='players'&&(
        <div className="space-y-3">
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-900">
            Tutaj możesz usunąć gracza wraz ze wszystkimi jego typami. Tej operacji nie da się cofnąć.
          </div>
          {players.length===0&&<p className="text-center text-stone-500 text-sm py-8">Brak graczy.</p>}
          {players.map(p=>(
            <AdminPlayerRow key={p.id} player={p} onRemove={()=>onRemovePlayer(p.id)}/>
          ))}
        </div>
      )}

      {tab==='data'&&(
        <div className="space-y-3">
          <div className="bg-white border border-stone-200 rounded-xl p-4">
            <h4 className="font-display text-base mb-2">Eksport danych</h4>
            <p className="text-xs text-stone-500 mb-3">Pobierz kopię zapasową wszystkich danych jako plik JSON.</p>
            <Btn variant="primary" onClick={handleExport} className="w-full"><Icon name="download" size={16}/>Pobierz JSON</Btn>
          </div>
          <div className="bg-white border border-stone-200 rounded-xl p-4">
            <h4 className="font-display text-base mb-2">Import danych</h4>
            <p className="text-xs text-stone-500 mb-3">Załaduj wcześniej wyeksportowany plik. <strong>Nadpisze obecne dane!</strong></p>
            <Btn variant="outline" size="sm" onClick={()=>fileRef.current?.click()} className="mb-2 w-full"><Icon name="upload" size={14}/>Załaduj plik</Btn>
            <input type="file" ref={fileRef} accept=".json" onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=()=>setImportText(r.result);r.readAsText(f);}} className="hidden"/>
            <textarea value={importText} onChange={e=>setImportText(e.target.value)} rows={4} placeholder='{"players": [...], ...}' className="w-full p-2 border border-stone-200 rounded-lg text-xs font-mono focus:border-[#0d1b5e] focus:outline-none mb-2"/>
            {importErr&&<p className="text-xs text-red-600 mb-2">{importErr}</p>}
            <Btn variant="primary" disabled={!importText.trim()} onClick={async()=>{try{const data=JSON.parse(importText);await onImport(data);setImportText('');setImportErr('');alert('Import zakończony!');}catch(e){setImportErr('Błąd: '+e.message);}}} className="w-full">Zaimportuj</Btn>
          </div>
          <div className="bg-red-50 border border-red-200 rounded-xl p-4">
            <h4 className="font-display text-base mb-2 text-red-900">Strefa niebezpieczna</h4>
            <p className="text-xs text-red-700 mb-3">Reset usuwa wszystkie dane. Tej operacji nie da się cofnąć.</p>
            {!resetConfirm?(
              <Btn variant="danger" onClick={()=>setResetConfirm(true)} className="w-full"><Icon name="reset" size={16}/>Resetuj wszystkie dane</Btn>
            ):(
              <div className="space-y-2">
                <p className="text-xs font-bold text-red-900 text-center">Na pewno? To koniec wszystkich danych.</p>
                <div className="flex gap-2">
                  <Btn variant="ghost" onClick={()=>setResetConfirm(false)} className="flex-1">Anuluj</Btn>
                  <Btn variant="danger" onClick={()=>{onResetAll();setResetConfirm(false);}} className="flex-1">TAK, RESETUJ</Btn>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  LOGIN MODAL — wybór gracza
// ═══════════════════════════════════════════════════════════════
function LoginModal({open,onClose,players,activePlayer,onLogin,onRename}) {
  const [selected,setSelected]=useState('');
  const [step,setStep]=useState('pick'); // 'pick' | 'pin' | 'rename'
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [newName,setNewName]=useState('');
  const [renameErr,setRenameErr]=useState('');

  useEffect(()=>{
    if(open){setSelected(activePlayer||'');setStep('pick');setPin('');setErr('');setNewName('');setRenameErr('');}
  },[open,activePlayer]);

  const pl=players.find(p=>p.id===selected);
  const hasPinHash=pl&&pl.pinHash;

  const handlePick=()=>{
    if(!selected){setErr('Wybierz gracza');return;}
    if(hasPinHash){setStep('pin');setPin('');setErr('');}
    else{onLogin(selected);}
  };

  const handlePin=()=>{
    if(pin.length<4){setErr('PIN musi mieć co najmniej 4 znaki');return;}
    if(hashPin(pin)!==pl.pinHash){setErr('Błędny PIN — spróbuj jeszcze raz');return;}
    onLogin(selected);
  };

  const handleRenameSubmit=()=>{
    const name=newName.trim();
    if(!name){setRenameErr('Wpisz imię i nazwisko');return;}
    if(name===pl.name){setRenameErr('Nowa nazwa jest taka sama jak obecna');return;}
    onRename(selected,name);
    onLogin(selected);
    onClose();
  };

  return (
    <Modal open={open} onClose={onClose} title="Zaloguj się">
      <div className="space-y-4">
        {step==='pick'&&(
          <>
            <p className="text-sm text-stone-600">Wybierz swój profil, żeby typować.</p>
            <div className="space-y-1.5">
              {players.length===0&&<p className="text-center text-stone-500 text-sm py-4">Brak graczy. Dodaj uczestników przyciskiem zarządzania graczami.</p>}
              {players.map(p=>(
                <button key={p.id} onClick={()=>setSelected(p.id)}
                  className={`selection-tile player-choice${selected===p.id?' is-selected':''}`}
                  style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:12,textAlign:'left',cursor:'pointer'}}>
                  <div className="player-choice-avatar" style={{width:36,height:36,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,flexShrink:0,color:'white'}}>
                    {p.name.slice(0,1).toUpperCase()}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div style={{fontWeight:700,fontSize:14,color:"rgba(255,255,255,.95)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginTop:2}}>{p.pinHash?'chroniony PINem':'bez PINu'}</div>
                  </div>
                  {selected===p.id&&<Icon name="check" size={18} style={{stroke:"rgba(255,255,255,.9)",flexShrink:0}}/>}
                </button>
              ))}
            </div>
            {err&&<p className="text-xs text-red-600 font-semibold">{err}</p>}
            <div className="flex gap-2 flex-wrap">
              <Btn variant="outline" onClick={onClose} className="flex-1">Anuluj</Btn>
              {selected&&<Btn variant="outline" onClick={()=>{if(!selected)return;setNewName(pl?.name||'');setStep('rename');setRenameErr('');}} className="flex-1">
                <Icon name="edit" size={14}/>Zmień nazwę
              </Btn>}
              <Btn variant="primary" onClick={handlePick} disabled={!selected} className="flex-1">
                {hasPinHash?<><Icon name="lock" size={14}/>Dalej</>:<><Icon name="check" size={14}/>Zaloguj</>}
              </Btn>
            </div>
            {activePlayer&&(
              <button onClick={()=>{onLogin('');onClose();}} style={{width:'100%',marginTop:4,padding:'8px',background:'rgba(180,0,0,.18)',border:'1px solid rgba(220,0,0,.3)',borderRadius:10,color:'rgba(255,100,100,.9)',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <Icon name="logout" size={14}/>Wyloguj się
              </button>
            )}
          </>
        )}
        {step==='pin'&&(
          <>
            <button onClick={()=>{setStep('pick');setErr('');}} className="text-xs text-stone-500 hover:text-stone-800 flex items-center gap-1">
              <Icon name="arrow" size={12} style={{transform:"rotate(180deg)"}}/>Wróć
            </button>
            <div className="text-center py-2">
              <div className="w-14 h-14 rounded-full bg-[#e8ecf8] flex items-center justify-center text-2xl font-bold text-[#162570] mx-auto mb-2">
                {pl.name.slice(0,1).toUpperCase()}
              </div>
              <p className="font-semibold text-stone-900">{pl.name}</p>
              <p className="text-xs text-stone-500 mt-0.5">Wpisz PIN, żeby się zalogować</p>
            </div>
            <input type="password" inputMode="numeric" value={pin} autoFocus
              onChange={e=>{setPin(e.target.value);setErr('');}}
              onKeyDown={e=>e.key==='Enter'&&handlePin()}
              placeholder="••••" maxLength={8}
              className={`w-full px-4 py-3 border-2 rounded-xl focus:outline-none text-center text-2xl tracking-[0.5em] ${err?'border-red-400 bg-red-50':'border-stone-200 focus:border-[#0d1b5e]'}`}/>
            {err&&<p className="text-xs text-red-600 font-semibold text-center">{err}</p>}
            <div className="flex gap-2">
              <Btn variant="outline" onClick={onClose} className="flex-1">Anuluj</Btn>
              <Btn variant="primary" onClick={handlePin} disabled={pin.length<4} className="flex-1">
                <Icon name="unlock" size={14}/>Zaloguj
              </Btn>
            </div>
          </>
        )}
        {step==='rename'&&(
          <>
            <button onClick={()=>{setStep('pick');setRenameErr('');}} className="text-xs text-stone-500 hover:text-stone-800 flex items-center gap-1">
              <Icon name="arrow" size={12} style={{transform:"rotate(180deg)"}}/>Wróć
            </button>
            <div className="text-center py-2">
              <div className="w-14 h-14 rounded-full bg-[#e8ecf8] flex items-center justify-center text-2xl font-bold text-[#162570] mx-auto mb-2">
                {pl&&pl.name.slice(0,1).toUpperCase()}
              </div>
              <p className="text-xs text-stone-500">Zmiana nazwy dla: <strong>{pl&&pl.name}</strong></p>
            </div>
            <div>
              <label className="text-xs font-semibold text-stone-600 block mb-1">Nowe imię i nazwisko</label>
              <input autoFocus value={newName} onChange={e=>{setNewName(e.target.value);setRenameErr('');}}
                onKeyDown={e=>{if(e.key==='Enter')handleRenameSubmit();}}
                placeholder="np. Jan Kowalski"
                className={`w-full px-3 py-2.5 border-2 rounded-lg focus:outline-none text-sm ${renameErr?'border-red-400 bg-red-50':'border-stone-200 focus:border-[#0d1b5e]'}`}/>
              {renameErr&&<p className="text-xs text-red-600 font-semibold mt-1">{renameErr}</p>}
            </div>
            <div className="flex gap-2">
              <Btn variant="outline" onClick={()=>setStep('pick')} className="flex-1">Anuluj</Btn>
              <Btn variant="primary" onClick={handleRenameSubmit} disabled={!newName.trim()} className="flex-1">
                <Icon name="check" size={14}/>Zapisz nazwę
              </Btn>
            </div>
          </>
        )}
      </div>
    </Modal>
  );
}

function PlayersManager({open,onClose,players,onAddPlayer}) {
  const [view,setView]=useState('list'); // 'list' | 'add'
  const [newName,setNewName]=useState('');
  const [newPin,setNewPin]=useState('');
  const [newPin2,setNewPin2]=useState('');
  const [error,setError]=useState('');

  const reset=()=>{setView('list');setNewName('');setNewPin('');setNewPin2('');setError('');};
  useEffect(()=>{if(!open)reset();},[open]);

  const handleAdd=()=>{
    const name=newName.trim();
    if(!name){setError('Wpisz imię');return;}
    if(players.find(p=>p.name.toLowerCase()===name.toLowerCase())){setError('Gracz o tym imieniu już istnieje');return;}
    if(newPin.length<4){setError('PIN musi mieć co najmniej 4 znaki');return;}
    if(newPin!==newPin2){setError('PINy się nie zgadzają');return;}
    onAddPlayer(name,newPin);
    reset();
  };

  return (
    <Modal open={open} onClose={onClose} title="Uczestnicy">
      <div className="space-y-3">
        {view==='list'&&(
          <>
            <div style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.28)",borderRadius:10,padding:12,fontSize:13,color:"white",lineHeight:"1.55"}}>
              Każdy uczestnik ma swój <strong>PIN</strong> — tylko Ty znasz swój PIN i tylko Ty możesz zmieniać swoje typy.
            </div>
            <Btn variant="primary" onClick={()=>setView('add')} className="w-full">
              <Icon name="plus" size={16}/>Dodaj nowego gracza
            </Btn>
            <div className="space-y-1.5">
              {players.length===0&&<p className="text-center text-stone-500 text-sm py-4">Brak graczy. Dodaj pierwszego!</p>}
              {players.map(p=>(
                <div key={p.id} className="flex items-center gap-3 bg-stone-50 border border-stone-200 rounded-lg p-2.5">
                  <div className="w-8 h-8 rounded-full bg-[#e8ecf8] flex items-center justify-center text-sm font-bold text-[#162570] shrink-0">
                    {p.name.slice(0,1).toUpperCase()}
                  </div>
                  <div className="min-w-0 flex-1">
                    <span className="font-medium text-stone-800 block truncate">{p.name}</span>
                    <span className="text-[11px] text-stone-500">{p.pinHash?'PIN ustawiony':'bez PINu'}</span>
                  </div>
                </div>
              ))}
            </div>
            <p className="text-[11px] text-stone-400 text-center">Usuwanie graczy dostępne tylko dla admina.</p>
          </>
        )}
        {view==='add'&&(
          <>
            <button onClick={reset} className="text-xs text-stone-500 hover:text-stone-800 flex items-center gap-1">
              <Icon name="arrow" size={12} style={{transform:"rotate(180deg)"}}/>Wróć
            </button>
            <div style={{background:'rgba(220,150,0,.18)',border:'1px solid rgba(255,200,50,.4)',borderRadius:12,padding:14}}>
              <div style={{fontSize:13,fontWeight:800,color:'#fcd34d',marginBottom:6}}>Opłata za udział — 20 PLN</div>
              <div style={{fontSize:13,color:'rgba(255,255,255,.9)',lineHeight:1.6}}>
                Aby wziąć udział w rozgrywce, prześlij <strong style={{color:'#fcd34d'}}>20 PLN</strong> BLIKiem na numer:
              </div>
              <div style={{margin:'10px 0',padding:'10px 14px',background:'rgba(0,0,0,.3)',borderRadius:9,textAlign:'center',fontFamily:'monospace',fontSize:20,fontWeight:900,letterSpacing:'0.12em',color:'white',border:'1px solid rgba(255,255,255,.15)'}}>
                785 700 344
              </div>
              <div style={{fontSize:11,color:'rgba(255,255,255,.55)',textAlign:'center'}}>W tytule podaj swoje imię i nazwisko</div>
            </div>
            <div style={{background:'rgba(255,200,50,.1)',border:'1px solid rgba(255,200,50,.3)',borderRadius:10,padding:12,fontSize:12,color:'rgba(255,255,255,.8)'}}>
              Zapamiętaj PIN — nie da się go odzyskać. Bez PINu nie będziesz mógł zapisywać typów.
            </div>
            <div>
              <label className="text-xs font-semibold text-stone-600 block mb-1">Imię i nazwisko</label>
              <input value={newName} onChange={e=>{setNewName(e.target.value);setError('');}}
                placeholder="np. Jan Kowalski" autoFocus
                className="w-full px-3 py-2.5 border-2 border-stone-200 rounded-lg focus:border-[#0d1b5e] focus:outline-none text-sm"/>
            </div>
            <div>
              <label className="text-xs font-semibold text-stone-600 block mb-1">PIN (min. 4 znaki)</label>
              <input type="password" inputMode="numeric" value={newPin} onChange={e=>{setNewPin(e.target.value);setError('');}}
                placeholder="••••" maxLength={8}
                className="w-full px-3 py-2.5 border-2 border-stone-200 rounded-lg focus:border-[#0d1b5e] focus:outline-none text-sm tracking-widest"/>
            </div>
            <div>
              <label className="text-xs font-semibold text-stone-600 block mb-1">Powtórz PIN</label>
              <input type="password" inputMode="numeric" value={newPin2} onChange={e=>{setNewPin2(e.target.value);setError('');}}
                onKeyDown={e=>e.key==='Enter'&&handleAdd()}
                placeholder="••••" maxLength={8}
                className="w-full px-3 py-2.5 border-2 border-stone-200 rounded-lg focus:border-[#0d1b5e] focus:outline-none text-sm tracking-widest"/>
            </div>
            {error&&<p className="text-xs text-red-600 font-semibold">{error}</p>}
            <div className="flex gap-2">
              <Btn variant="outline" onClick={reset} className="flex-1">Anuluj</Btn>
              <Btn variant="primary" onClick={handleAdd} className="flex-1"><Icon name="plus" size={16}/>Utwórz konto</Btn>
            </div>
          </>
        )}
      </div>
    </Modal>
  );
}

  upper: {

function bracketWinnerSide(result){
  if(!result) return null;
  if(result.advancingTeam==='home'||result.advancingTeam==='away') return result.advancingTeam;
  if(typeof result.home==='number'&&typeof result.away==='number'&&result.home!==result.away)
    return result.home>result.away?'home':'away';
  return null;
}

function BracketMatchCard({match,teams,result,sourceLabels=['Do ustalenia','Do ustalenia'],style,large=false}){
  if(!match) return null;
  const home=teams[match.homeTeamId];
  const away=teams[match.awayTeamId];
  const winner=bracketWinnerSide(result);
  const finished=!!result;
  const row=(side,team,placeholder)=>{
    const isWinner=winner===side;
    const isLoser=finished&&winner&&winner!==side;
    const score=result&&typeof result[side]==='number'?result[side]:'–';
    return (
      <div className={`bracket-team-row${isWinner?' is-winner':''}${isLoser?' is-loser':''}`}>
        {team?<FlagImg code={team.flag} size={large?22:16} title={team.name}/>:<span/>}
        <span className={`bracket-team-name${team?'':' bracket-placeholder'}`}>{team?.name||placeholder}</span>
        <span className="bracket-score">{score}</span>
      </div>
    );
  };
  return (
    <div className={`${large?'bracket-final-card':'bracket-match'}${finished?' is-finished':''}`} style={style}>
      <div className="bracket-match-head">
        <span>Mecz {match.num}</span>
        <span>{formatDate(match.date)}</span>
      </div>
      {row('home',home,sourceLabels[0])}
      {row('away',away,sourceLabels[1])}
    </div>
  );
}

function BracketHalf({config,matchesById,teams,results}){
  const xs=[0,246,492,738];
  const ys=[
    [0,70,140,210,280,350,420,490],
    [35,175,315,455],
    [105,385],
    [245],
  ];
  const cardH=66;
  const cardW=192;
  const connectorPaths=[];
  for(let round=0;round<3;round++){
    const fromYs=ys[round];
    const toYs=ys[round+1];
    const x1=xs[round]+cardW;
    const x2=xs[round+1];
    const mid=(x1+x2)/2;
    toYs.forEach((toY,targetIndex)=>{
      const firstSource=fromYs[targetIndex*2];
      const secondSource=fromYs[targetIndex*2+1];
      if(firstSource===undefined||secondSource===undefined) return;
      const yTop=firstSource+cardH/2;
      const yBottom=secondSource+cardH/2;
      const yTarget=toY+cardH/2;
      /* Jedna ścieżka na każde połączenie pary. Dzięki temu wspólny pionowy
         i końcowy poziomy odcinek nie są rysowane dwa razy i nie robią się jaśniejsze. */
      const d=[
        `M${x1},${yTop} H${mid}`,
        `M${x1},${yBottom} H${mid}`,
        `M${mid},${yTop} V${yBottom}`,
        `M${mid},${yTarget} H${x2}`,
      ].join(' ');
      connectorPaths.push(<path key={`${round}-${targetIndex}`} d={d}/>);
    });
  }
  return (
    <section className="bracket-section">
      <div className="bracket-section-title">
        <h3>{config.title}</h3>
        <span>Przesuń poziomo, aby zobaczyć kolejne rundy</span>
      </div>
      <div className="bracket-scroll">
        <div className="bracket-board">
          {config.rounds.map((round,idx)=><div key={round.label} className="bracket-round-label" style={{left:xs[idx]}}>{round.label}</div>)}
          <svg className="bracket-connectors" viewBox="0 0 930 560" preserveAspectRatio="none">{connectorPaths}</svg>
          {config.rounds.map((round,rIdx)=>round.ids.map((id,mIdx)=>{
            const match=matchesById[id];
            return <BracketMatchCard key={id} match={match} teams={teams} result={results[id]} sourceLabels={BRACKET_SOURCES[id]} style={{left:xs[rIdx],top:40+ys[rIdx][mIdx]}}/>;
          }))}
        </div>
      </div>
    </section>
  );
}

function TournamentBracket({matches,teams,results}){
  const matchesById=useMemo(()=>Object.fromEntries(matches.map(m=>[m.id,m])),[matches]);
  const finalMatch=matchesById.M104;
  const thirdMatch=matchesById.M103;
  const finalResult=results.M104;
  const finalWinner=bracketWinnerSide(finalResult);
  const championId=finalWinner&&finalMatch?(finalWinner==='home'?finalMatch.homeTeamId:finalMatch.awayTeamId):null;
  const champion=championId?teams[championId]:null;
  return (
    <div className="bracket-page">
      <div className="bracket-intro">
        <h2>Drabinka turnieju</h2>
        <p>Pary i wyniki aktualizują się automatycznie po zapisaniu ich przez administratora. Na telefonie przeciągnij drabinkę poziomo.</p>
      </div>
      <BracketHalf config={BRACKET_LAYOUT.upper} matchesById={matchesById} teams={teams} results={results}/>
      <BracketHalf config={BRACKET_LAYOUT.lower} matchesById={matchesById} teams={teams} results={results}/>
      <section className="bracket-section">
        <div className="bracket-section-title"><h3>Medale</h3><span>Finał i mecz o 3. miejsce</span></div>
        <div className="bracket-finals-grid">
          <div>
            <div className="text-xs font-bold text-stone-500 mb-2 text-center">Mecz o 3. miejsce</div>
            <BracketMatchCard match={thirdMatch} teams={teams} result={results.M103} sourceLabels={BRACKET_SOURCES.M103} large/>
          </div>
          <div>
            <div className="text-xs font-bold text-stone-500 mb-2 text-center">Finał</div>
            <BracketMatchCard match={finalMatch} teams={teams} result={finalResult} sourceLabels={BRACKET_SOURCES.M104} large/>
          </div>
        </div>
        <div className="bracket-champion">
          {champion?<span className="inline-flex items-center justify-center gap-2"><FlagImg code={champion.flag} size={22} title={champion.name}/>Mistrz świata 2026: {champion.name}</span>:<span className="bracket-champion-empty">Mistrz świata zostanie pokazany po zapisaniu wyniku finału</span>}
        </div>
      </section>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  DOLNA NAWIGACJA — przeciągalna "kropla" w stylu iOS 26
// ═══════════════════════════════════════════════════════════════
function BottomNav({tabs, activeTab, onSelect}) {
  const trackRef = useRef(null);
  const [drop, setDrop] = useState({left:0, width:0});
  const [dragging, setDragging] = useState(false);
  const [previewIdx, setPreviewIdx] = useState(null);
  const dragInfo = useRef({active:false, startX:0, hoverIdx:0, moved:false, pointerId:null, captured:false});
  const suppressClick = useRef(false);
  const moveFrame = useRef(0);

  const activeIdx = Math.max(0, tabs.findIndex(t=>t.k===activeTab));
  const visualIdx = dragging && previewIdx!==null ? previewIdx : activeIdx;

  // Pozycja pastylki jest liczona z faktycznego prostokąta przycisku.
  const positionFor = useCallback((idx)=>{
    const track = trackRef.current;
    if(!track) return null;
    const buttons = track.querySelectorAll('button[data-nav-index]');
    const btn = buttons[idx];
    if(!btn) return null;
    const trackRect = track.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();
    const inset = 1;
    return {
      left: btnRect.left - trackRect.left + inset,
      width: Math.max(0, btnRect.width - inset*2)
    };
  },[]);

  // Dopasowanie po zmianie zakładki i rozmiaru ekranu.
  useEffect(()=>{
    if(dragging) return;
    const update=()=>{ const p=positionFor(activeIdx); if(p) setDrop(p); };
    const frame=requestAnimationFrame(update);
    window.addEventListener('resize', update);
    return ()=>{
      cancelAnimationFrame(frame);
      window.removeEventListener('resize', update);
    };
  },[activeIdx, tabs.length, positionFor, dragging]);

  const idxFromX = useCallback((clientX)=>{
    const track = trackRef.current;
    if(!track) return activeIdx;
    const buttons = Array.from(track.querySelectorAll('button[data-nav-index]'));
    if(!buttons.length) return activeIdx;
    let nearest = 0;
    let nearestDistance = Infinity;
    buttons.forEach((btn, idx)=>{
      const rect = btn.getBoundingClientRect();
      const center = rect.left + rect.width/2;
      const distance = Math.abs(clientX-center);
      if(distance<nearestDistance){ nearestDistance=distance; nearest=idx; }
    });
    return nearest;
  },[activeIdx]);

  const onPointerDown = (e)=>{
    if(e.button!==undefined && e.button!==0) return;
    const startIdx=idxFromX(e.clientX);
    dragInfo.current={
      active:true,
      startX:e.clientX,
      hoverIdx:startIdx,
      moved:false,
      pointerId:e.pointerId,
      captured:false
    };
    suppressClick.current=false;
    // Nie przechwytujemy wskaźnika od razu, bo na iOS blokuje to zwykły click
    // przycisku. Pointer capture włączamy dopiero po rozpoczęciu przeciągania.
  };

  const onPointerMove = (e)=>{
    const info=dragInfo.current;
    if(!info.active || (info.pointerId!==null && e.pointerId!==info.pointerId)) return;
    const clientX=e.clientX;
    if(!info.moved && Math.abs(clientX-info.startX)>6){
      info.moved=true;
      suppressClick.current=true;
      setDragging(true);
      if(e.currentTarget.setPointerCapture){
        try{
          e.currentTarget.setPointerCapture(e.pointerId);
          info.captured=true;
        }catch(_){}
      }
    }
    if(!info.moved) return;
    if(e.cancelable) e.preventDefault();
    if(moveFrame.current) cancelAnimationFrame(moveFrame.current);
    moveFrame.current=requestAnimationFrame(()=>{
      const idx=idxFromX(clientX);
      dragInfo.current.hoverIdx=idx;
      setPreviewIdx(idx);
      const p=positionFor(idx);
      if(p) setDrop(p);
      moveFrame.current=0;
    });
  };

  const finishPointer = (e, commit)=>{
    if(moveFrame.current){cancelAnimationFrame(moveFrame.current);moveFrame.current=0;}
    const info=dragInfo.current;
    if(!info.active) return;
    if(info.pointerId!==null && e?.pointerId!==undefined && e.pointerId!==info.pointerId) return;

    if(info.captured && e?.currentTarget?.releasePointerCapture && info.pointerId!==null){
      try{e.currentTarget.releasePointerCapture(info.pointerId);}catch(_){}
    }

    const moved=!!info.moved;
    const idx=e?.clientX!==undefined ? idxFromX(e.clientX) : info.hoverIdx;
    dragInfo.current={active:false,startX:0,hoverIdx:activeIdx,moved:false,pointerId:null,captured:false};
    setDragging(false);
    setPreviewIdx(null);

    if(moved && commit && tabs[idx]){
      const p=positionFor(idx);
      if(p) setDrop(p);
      if(tabs[idx].k!==activeTab) onSelect(tabs[idx].k);
      // Klik generowany po przeciągnięciu nie może cofnąć wyboru.
      setTimeout(()=>{suppressClick.current=false;},0);
    } else {
      const p=positionFor(activeIdx);
      if(p) setDrop(p);
      if(!moved) suppressClick.current=false;
      else setTimeout(()=>{suppressClick.current=false;},0);
    }
  };

  const onNavClick=(e,tabKey)=>{
    if(suppressClick.current){
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    onSelect(tabKey);
  };

  useEffect(()=>()=>{if(moveFrame.current)cancelAnimationFrame(moveFrame.current);},[]);

  const visualTab=tabs[visualIdx];
  const isAdminVisual=visualTab && visualTab.k==='admin';

  return (
    <nav className="bottom-nav">
      <div className="nav-track" ref={trackRef}
           onPointerDown={onPointerDown}
           onPointerMove={onPointerMove}
           onPointerUp={e=>finishPointer(e,true)}
           onPointerCancel={e=>finishPointer(e,false)}>
        <div className={"nav-droplet"+(dragging?" dragging":"")}
             style={{left:drop.left+'px', width:drop.width+'px',
                     ...(isAdminVisual?{background:'linear-gradient(145deg,rgba(160,120,255,.40),rgba(124,58,237,.20))',borderColor:'rgba(170,130,255,.5)'}:{})}}/>
        {tabs.map((t,i)=>{
          const visuallyActive=visualIdx===i;
          return (
            <button key={t.k}
              type="button"
              data-nav-index={i}
              className={visuallyActive?'active':''}
              aria-current={visuallyActive?'page':undefined}
              onClick={e=>onNavClick(e,t.k)}
              style={t.k==='admin'&&visuallyActive?{color:'#ddd1ff'}:{}}>
              <NavIcon name={t.i} size={20} style={t.k==='admin'&&visuallyActive?{color:'#ddd1ff'}:{}}/>
              <span className="nav-label">{t.l}</span>
            </button>
          );
        })}
      </div>
    </nav>
  );
}

const INITIAL_TEAMS_CACHE=generateInitialTeams();
function Mundial2026() {
  const [players,setPlayers,plLoaded]=useFirebaseState(FB.players,[]);
  const [teams,setTeams,tLoaded]=useFirebaseState(FB.teams,generateInitialTeams());
  const [matches,setMatches,mLoaded]=useFirebaseState(FB.matches,generateInitialMatches());
  const [predictions,setPredictions,prLoaded]=useFirebaseState(FB.predictions,{});
  const [results,setResults,rLoaded]=useFirebaseState(FB.results,{});
  const [specialPredictions,setSpecialPredictions,spLoaded]=useFirebaseState(FB.specialPredictions,{});
  const [specialResults,setSpecialResults,srLoaded]=useFirebaseState(FB.specialResults,{groupOrders:{}});
  const [adminPasswordHash,setAdminPasswordHash,apLoaded]=useFirebaseState(FB.adminPassword,'');
  const [phaseLocks,setPhaseLocks,plkLoaded]=useFirebaseState(FB.phaseLocks,{});

  // activePlayer — lokalnie (per-urządzenie)
  const [activePlayer,setActivePlayerState]=useState(()=>{try{return localStorage.getItem('wc2026:activePlayer')||'';}catch(e){return '';}});
  const setActivePlayer=useCallback((id)=>{try{localStorage.setItem('wc2026:activePlayer',id);}catch(e){}setActivePlayerState(id);},[]);

  const [activeTab,setActiveTab]=useState('matches');

  // Po każdej zmianie głównej zakładki wróć na samą górę strony.
  useEffect(()=>{ scrollAppToTop(); },[activeTab]);

  const [adminUnlocked,setAdminUnlocked]=useState(false);
  const [playersModal,setPlayersModal]=useState(false);
  const [loginModal,setLoginModal]=useState(false);

  const allLoaded=plLoaded&&tLoaded&&mLoaded&&prLoaded&&rLoaded&&spLoaded&&srLoaded&&apLoaded&&plkLoaded;

  const tournamentLocked=useMemo(()=>matches.some(m=>results[m.id])||(phaseLocks&&!!phaseLocks['specials']),[matches,results,phaseLocks]);

  // inicjalizacja domyślnych danych w Firebase jeśli pusta baza
  useEffect(()=>{
    if(!allLoaded) return;
    if(!teams||Object.keys(teams).length===0) setTeams(generateInitialTeams());
    if(!matches||matches.length===0) setMatches(generateInitialMatches());
  },[allLoaded]);

  useEffect(()=>{
    if(allLoaded&&!activePlayer&&players&&players.length>0) setActivePlayer(players[0].id);
  },[allLoaded,players]);

  useEffect(()=>{
    if(allLoaded){document.getElementById('loading').style.display='none';document.getElementById('root').style.display='block';}
  },[allLoaded]);

  const handleAddPlayer=useCallback((name,pin)=>{
    const p={id:uid(),name,pinHash:hashPin(pin),createdAt:Date.now()};
    setPlayers(prev=>[...(Array.isArray(prev)?prev:[]),p]);
    if(!activePlayer)setActivePlayer(p.id);
  },[setPlayers,activePlayer,setActivePlayer]);

  const handleRenamePlayer=useCallback((id,newName)=>{
    setPlayers(prev=>(Array.isArray(prev)?prev:[]).map(p=>p.id===id?{...p,name:newName.trim()}:p));
  },[setPlayers]);

  const handleRemovePlayer=useCallback((id)=>{
    setPlayers(prev=>(Array.isArray(prev)?prev:[]).filter(p=>p.id!==id));
    if(activePlayer===id)setActivePlayer('');
    setPredictions(prev=>{const n={...prev};Object.keys(n).forEach(k=>{if(k.startsWith(`${id}:`))delete n[k];});return n;});
    setSpecialPredictions(prev=>{const n={...prev};delete n[id];return n;});
  },[setPlayers,activePlayer,setActivePlayer,setPredictions,setSpecialPredictions]);

  const handleSavePrediction=useCallback((matchId,payload,pin,onErr,onSuccess)=>{
    if(!activePlayer)return;
    const pl=(Array.isArray(players)?players:[]).find(p=>p.id===activePlayer);
    if(pl&&pl.pinHash&&hashPin(pin)!==pl.pinHash){onErr&&onErr('Błędny PIN');return;}
    setPredictions(prev=>({...(prev||{}),[`${activePlayer}:${matchId}`]:payload}));
    onSuccess&&onSuccess();
  },[activePlayer,players,setPredictions]);

  const handleSaveSpecial=useCallback((playerId,payload,pin,onErr,onSuccess)=>{
    const pl=(Array.isArray(players)?players:[]).find(p=>p.id===playerId);
    if(pl&&pl.pinHash&&hashPin(pin)!==pl.pinHash){onErr&&onErr('Błędny PIN');return;}
    setSpecialPredictions(prev=>({...(prev||{}),[playerId]:payload}));
    onSuccess&&onSuccess();
  },[players,setSpecialPredictions]);

  const handleSaveResult=useCallback((matchId,payload)=>{
    setResults(prev=>({...(prev||{}),[matchId]:payload}));
  },[setResults]);

  const handleDeleteResult=useCallback((matchId)=>{
    setResults(prev=>{const n={...(prev||{})};delete n[matchId];return n;});
  },[setResults]);

  const handleUpdateTeam=useCallback((idOrMatchId,nameOrHomeId,flagOrAwayId)=>{
    if(idOrMatchId.startsWith('M')){
      setMatches(prev=>(prev||[]).map(m=>m.id===idOrMatchId?{...m,homeTeamId:nameOrHomeId,awayTeamId:flagOrAwayId}:m));
    } else {
      setTeams(prev=>({...(prev||{}),[idOrMatchId]:{...(prev||{})[idOrMatchId],name:nameOrHomeId,flag:flagOrAwayId}}));
    }
  },[setMatches,setTeams]);

  const handleImport=useCallback(async(data)=>{
    if(data.players)await setPlayers(data.players);
    if(data.teams)await setTeams(data.teams);
    if(data.matches)await setMatches(data.matches);
    if(data.predictions)await setPredictions(data.predictions);
    if(data.results)await setResults(data.results);
    if(data.specialPredictions)await setSpecialPredictions(data.specialPredictions);
    if(data.specialResults)await setSpecialResults(data.specialResults);
    if(data.phaseLocks)await setPhaseLocks(data.phaseLocks);
  },[setPlayers,setTeams,setMatches,setPredictions,setResults,setSpecialPredictions,setSpecialResults]);

  const handleResetAll=useCallback(async()=>{
    await setPlayers([]); await setTeams(generateInitialTeams()); await setMatches(generateInitialMatches());
    await setPredictions({}); await setResults({}); await setSpecialPredictions({}); await setSpecialResults({groupOrders:{}});
    setActivePlayer('');
  },[setPlayers,setTeams,setMatches,setPredictions,setResults,setSpecialPredictions,setSpecialResults,setActivePlayer]);

  const compareOn=!!(phaseLocks&&phaseLocks['compareVisible']);
  useEffect(()=>{
    if(!compareOn&&!adminUnlocked&&(activeTab==='compare'||activeTab==='allspecials'))
      setActiveTab('matches');
  },[compareOn,adminUnlocked]);
  const tabs=useMemo(()=>[
    {k:'matches',l:'Mecze',i:'calendar'},
    {k:'bracket',l:'Drabinka',i:'bracket'},
    {k:'specials',l:'Specjalne',i:'star'},
    {k:'leaderboard',l:'Ranking',i:'podium'},
    {k:'mine',l:'Moje',i:'user'},
    ...(compareOn||adminUnlocked?[{k:'compare',l:'Porównaj',i:'eye'},{k:'allspecials',l:'Wszyscy',i:'users'}]:[]),
    ...(adminUnlocked?[{k:'admin',l:'Wyniki',i:'settings'}]:[]),
  ],[compareOn,adminUnlocked]);

  const safeTeams=useMemo(()=>{const init=INITIAL_TEAMS_CACHE;const src=teams||init;return Object.fromEntries(Object.entries(src).map(([k,v])=>[k,{...(init[k]||{}), ...v}]));}, [teams]);
  const safeMatches=useMemo(()=>Array.isArray(matches)?matches:[],[matches]);
  const safePlayers=useMemo(()=>Array.isArray(players)?players:[],[players]);
  const safePredictions=useMemo(()=>predictions||{},[predictions]);
  const safeResults=useMemo(()=>results||{},[results]);
  const safeSpecialPredictions=useMemo(()=>specialPredictions||{},[specialPredictions]);
  const safeSpecialResults=useMemo(()=>specialResults||{groupOrders:{}},[specialResults]);
  const activePlayerData=useMemo(()=>safePlayers.find(p=>p.id===activePlayer)||null,[safePlayers,activePlayer]);

  // ── install prompt ──
  const [installPrompt,setInstallPrompt]=useState(null);
  const [showInstall,setShowInstall]=useState(false);
  const [toast,setToast]=useState('');
  const toastTimer=useRef(0);
  const showToast=useCallback((msg)=>{
    setToast(msg);
    if(toastTimer.current)clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>{setToast('');toastTimer.current=0;},1600);
  },[]);
  useEffect(()=>()=>{if(toastTimer.current)clearTimeout(toastTimer.current);},[]);
  const onSavePredictionCb=useCallback((id,p,pin,onErr)=>{handleSavePrediction(id,p,pin,onErr,()=>showToast('Typ zapisany'));},[handleSavePrediction,showToast]);
  const onSaveSpecialCb=useCallback((id,p,pin,onErr)=>{handleSaveSpecial(id,p,pin,onErr,()=>showToast('Typy specjalne zapisane'));},[handleSaveSpecial,showToast]);
  const onSaveResultCb=useCallback((id,p)=>{handleSaveResult(id,p);showToast('Wynik zapisany');},[handleSaveResult,showToast]);
  const onUpdateTeamCb=useCallback((id,a,b)=>{
    handleUpdateTeam(id,a,b);
    showToast(id.startsWith('M')?'Para meczu zapisana':'Drużyna zapisana');
  },[handleUpdateTeam,showToast]);
  useEffect(()=>{
    const h=e=>{e.preventDefault();setInstallPrompt(e);setShowInstall(true);};
    window.addEventListener('beforeinstallprompt',h);
    return()=>window.removeEventListener('beforeinstallprompt',h);
  },[]);
  const doInstall=()=>{if(!installPrompt)return;installPrompt.prompt();installPrompt.userChoice.then(()=>{setInstallPrompt(null);setShowInstall(false);});};

  return (
    <div className="min-h-screen pitch-bg">
      {/* HEADER */}
      <header className="app-header">
        <div className="logo">
          <div className="logo-icon">⚽</div>
          <div className="title-group">
            <h1>MISTRZOSTWA FIFA 2026</h1>
          </div>
        </div>
        <div className="player-row">
          <button onClick={()=>setLoginModal(true)} className="login-btn">
            <NavIcon name="user" size={15}/>
            {activePlayerData
              ?<span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{activePlayerData.name}</span>
              :<span>Zaloguj się</span>}
          </button>
          <button className="players-btn" onClick={()=>setPlayersModal(true)} title="Zarządzaj graczami">
            <NavIcon name="users" size={18}/>
          </button>
          <button className="players-btn" onClick={()=>{setActiveTab('admin');}} title="Panel admina (wyniki)"
            style={{background:activeTab==='admin'?'rgba(124,58,237,.3)':'rgba(0,0,0,.2)',borderColor:activeTab==='admin'?'#a78bfa':'rgba(255,255,255,.25)'}}>
            <NavIcon name="settings" size={17}/>
          </button>
        </div>
      </header>

      {/* TOAST */}
      {toast&&<div className="toast-bar">{toast}</div>}

      {/* CONTENT */}
      <div className="app-content">
        {/* install banner */}
        {showInstall&&(
          <div className="install-banner">
            <div className="ib-text">
              <h4 className="flex items-center gap-1.5"><Icon name="download" size={15}/>Zainstaluj aplikację</h4>
              <p>Dodaj do ekranu głównego i typuj jak w natywnej apce!</p>
            </div>
            <button onClick={doInstall}>Zainstaluj</button>
          </div>
        )}

        {safePlayers.length===0&&activeTab!=='admin'&&(
          <div className="bg-amber-50 border border-amber-300 rounded-xl p-5 mb-4 text-center">
            <Icon name="users" size={32} className="text-amber-700 mx-auto mb-3 block"/>
            <p className="font-display text-xl tracking-wide text-amber-900 mb-1">Brak uczestników</p>
            <p className="text-sm text-amber-800 mb-4">Zacznij od dodania siebie i znajomych.</p>
            <Btn variant="gold" size="lg" onClick={()=>setPlayersModal(true)}>
              <Icon name="plus" size={18}/>Dodaj pierwszego gracza
            </Btn>
          </div>
        )}

        <div className="tab-view" key={activeTab}>
          {activeTab==='matches'&&<MatchesView matches={safeMatches} teams={safeTeams} predictions={safePredictions} results={safeResults} players={safePlayers} activePlayerId={activePlayer} phaseLocks={phaseLocks} onSavePrediction={onSavePredictionCb}/>}
          {activeTab==='bracket'&&<TournamentBracket matches={safeMatches} teams={safeTeams} results={safeResults}/>}
          {activeTab==='specials'&&<SpecialsView teams={safeTeams} players={safePlayers} activePlayerId={activePlayer} specialPredictions={safeSpecialPredictions} specialResults={safeSpecialResults} onSaveSpecial={onSaveSpecialCb} tournamentLocked={false} specialsLocked={!!(phaseLocks&&phaseLocks['specials'])}/>}
          {activeTab==='leaderboard'&&<LeaderboardView players={safePlayers} matches={safeMatches} predictions={safePredictions} results={safeResults} specialPredictions={safeSpecialPredictions} specialResults={safeSpecialResults}/>}
          {activeTab==='mine'&&<MyPredictionsView activePlayerId={activePlayer} players={safePlayers} matches={safeMatches} teams={safeTeams} predictions={safePredictions} results={safeResults}/>}
          {activeTab==='compare'&&<CompareView matches={safeMatches} teams={safeTeams} predictions={safePredictions} results={safeResults} players={safePlayers}/>}
          {activeTab==='allspecials'&&<SpecialsAllView players={safePlayers} specialPredictions={safeSpecialPredictions} specialResults={safeSpecialResults} teams={safeTeams}/>}
          {activeTab==='admin'&&(
            !adminUnlocked
              ? <AdminGate adminPassword={adminPasswordHash} onUnlock={(pwd,onErr)=>{if(hashPwd(pwd)===adminPasswordHash)setAdminUnlocked(true);else onErr('Złe hasło');}} onSetPassword={pwd=>{setAdminPasswordHash(hashPwd(pwd));setAdminUnlocked(true);}}/>
              : <AdminPanel teams={safeTeams} matches={safeMatches} results={safeResults} specialResults={safeSpecialResults} players={safePlayers} predictions={safePredictions} specialPredictions={safeSpecialPredictions}
                  phaseLocks={phaseLocks} onSavePhaseLocks={setPhaseLocks}
                  onRemovePlayer={handleRemovePlayer}
                  onSaveResult={onSaveResultCb} onDeleteResult={handleDeleteResult} onUpdateTeam={onUpdateTeamCb}
                  onSaveSpecialResults={s=>setSpecialResults(s)} onResetAll={handleResetAll}
                  onExport={()=>({version:1,exportedAt:new Date().toISOString(),players:safePlayers,teams:safeTeams,matches:safeMatches,predictions:safePredictions,results:safeResults,specialPredictions:safeSpecialPredictions,specialResults:safeSpecialResults,phaseLocks})}
                  onImport={handleImport} onLogout={()=>setAdminUnlocked(false)}/>
          )}
        </div>
      </div>

      {/* BOTTOM NAV */}
      <BottomNav tabs={tabs} activeTab={activeTab} onSelect={setActiveTab}/>

      <PlayersManager open={playersModal} onClose={()=>setPlayersModal(false)} players={safePlayers} onAddPlayer={handleAddPlayer}/>
      <LoginModal open={loginModal} onClose={()=>setLoginModal(false)} players={safePlayers} activePlayer={activePlayer} onLogin={(id)=>{setActivePlayer(id);setLoginModal(false);}} onRename={handleRenamePlayer}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Mundial2026/>);
</script>
</body>
</html>
