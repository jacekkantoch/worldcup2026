  <style>
    /* ═══════════════════════════════════════════
       LIQUID GLASS — Mundial 2026
       Tło: głęboki granat z rozmytymi bańkami
       Karty: szkło (blur + przezroczystość)
       Akcenty: biel, złoto, czerwień
    ═══════════════════════════════════════════ */
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
      --navy:   #050d2e;
      --navy2:  #0a1850;
      --glass:  rgba(255,255,255,0.11);
      --glass2: rgba(255,255,255,0.18);
      --glass3: rgba(255,255,255,0.26);
      --border: rgba(255,255,255,0.22);
      --border2:rgba(255,255,255,0.35);
      --gold:   #f4c842;
      --red:    #c0151a;
      --green:  #006940;
      --text:   rgba(255,255,255,1.0);
      --text2:  rgba(255,255,255,0.85);
      --text3:  rgba(255,255,255,0.60);
    }

    html, body {
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      margin: 0; padding: 0;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      padding-bottom: calc(72px + var(--safe-bottom));
      min-height: 100vh;
      background: linear-gradient(180deg, #2541b0 0%, #1c3296 12%, #142772 28%, #0e1c54 46%, #0a1440 66%, #070f30 84%, #050b22 100%);
      background-attachment: fixed;
      color: var(--text);
    }

    /* ── Liquid glass helper ── */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border: 1px solid var(--border);
    }

    /* ── Header ── */
    .app-header {
      position: sticky; top: 0; z-index: 30;
      background: rgba(28,45,130,0.55);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border-bottom: 1px solid var(--border);
      color: white;
      padding: calc(var(--safe-top) + 10px) 14px 10px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .app-header .logo { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .app-header .logo-icon {
      width:36px; height:36px; background:white; border-radius:10px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      box-shadow: 0 2px 12px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.8);
    }
    .app-header .title-group { min-width: 0; }
    .app-header .title-group h1 {
      margin:0; font-family:'Bebas Neue',sans-serif;
      font-size:19px; letter-spacing:.12em; line-height:1; color:white;
    }
    .app-header .title-group small {
      font-size:9.5px; letter-spacing:.2em; color:rgba(255,255,255,.5);
      text-transform:uppercase; display:block; margin-top:1px;
    }
    .player-row { display:flex; align-items:center; gap:7px; }
    .player-row select {
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.22);
      color: white; font-size: 13px; border-radius: 10px; padding: 6px 10px;
      max-width: 130px; font-family: 'DM Sans',system-ui,sans-serif; font-weight:600;
    }
    .player-row select option { background: #050d2e; }
    .players-btn {
      width:36px; height:36px; border-radius:10px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(8px);
      color: white; display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0; transition: background .15s;
    }
    .players-btn:active { background: rgba(255,255,255,.2); }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
      background: rgba(8,14,48,0.85);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border-top: 1px solid var(--border);
      padding-bottom: var(--safe-bottom);
      display: flex; align-items: stretch;
    }
    .bottom-nav button {
      flex: 1 1 0%; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px;
      padding: 9px 2px 7px; border: none; background: none; cursor: pointer;
      color: rgba(255,255,255,.38); font-size: 8.2px; font-weight: 700;
      letter-spacing: .01em; text-transform: uppercase;
      transition: color .15s, transform .1s; position: relative; min-width: 0;
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    .bottom-nav button.active { color: white; }
    .bottom-nav button.active svg { stroke: white; }
    .bottom-nav button.active::after {
      content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px;
      background: linear-gradient(90deg, var(--green), var(--gold), var(--red));
      border-radius: 0 0 4px 4px;
    }
    .bottom-nav button:active { transform: scale(.9); }
    .bottom-nav .nav-label {
      display: block; width: 100%; max-width: 100%;
      white-space: normal; overflow-wrap: break-word; word-break: break-word;
      text-align: center; line-height: 1.15; margin-top: 1px;
    }
    @media (max-width: 380px) {
      .bottom-nav button { font-size: 7.6px; }
    }

    /* ── Content ── */
    .app-content { max-width: 680px; margin: 0 auto; padding: 14px 12px 10px; }

    /* ── Tab animation ── */
    .tab-view { animation: slideIn .22s cubic-bezier(.22,1,.36,1) both; }
    @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    /* ── Toast ── */
    .toast-bar {
      position:fixed; top:calc(var(--safe-top) + 66px); left:50%; transform:translateX(-50%);
      z-index:100;
      background: rgba(255,255,255,.18);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.3);
      color: white; padding:9px 20px; border-radius:999px;
      font-weight:700; font-size:13px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.25);
      animation: toastIn .25s ease-out, toastOut .25s ease-in 1.7s both;
      pointer-events:none; white-space:nowrap;
    }
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-10px)}}

    /* ── Install banner ── */
    .install-banner {
      background: var(--glass2);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border2);
      border-radius: 16px; padding:14px; margin-bottom:14px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .install-banner .ib-text h4{margin:0 0 2px;font-size:14px;font-weight:800;color:white;}
    .install-banner .ib-text p{margin:0;font-size:11px;color:var(--text2);}
    .install-banner button{
      background: white; color: var(--navy2); border:none; border-radius:10px;
      padding:8px 14px; font-weight:800; font-size:13px; cursor:pointer; white-space:nowrap;
    }

    /* ── Tailwind overrides — glass cards ── */
    /* bg-white → glass */
    .bg-white {
      background: rgba(255,255,255,0.07) !important;
      backdrop-filter: blur(16px) saturate(1.3) !important;
      -webkit-backdrop-filter: blur(16px) saturate(1.3) !important;
    }
    /* borders */
    .border-stone-200, .border { border-color: var(--border) !important; }
    .border-stone-100 { border-color: rgba(255,255,255,.08) !important; }
    /* text colors — wszystkie białe */
    .text-stone-900, .text-stone-800,
    .text-stone-700, .text-stone-600,
    .text-stone-500, .text-stone-400,
    .text-stone-300 { color: rgba(255,255,255,.92) !important; }
    /* backgrounds */
    .bg-stone-50, .bg-stone-50\/50 { background: rgba(255,255,255,.06) !important; }
    .bg-stone-100 { background: rgba(255,255,255,.11) !important; }
    .bg-stone-800, .bg-stone-900 {
      background: rgba(0,0,0,.35) !important;
      backdrop-filter: blur(12px) !important;
    }
    /* inputs */
    input, select, textarea {
      background: rgba(255,255,255,.1) !important;
      color: white !important;
      border-color: var(--border) !important;
    }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,.35) !important; }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(255,255,255,.55) !important;
      background: rgba(255,255,255,.15) !important;
      outline: none;
    }
    select option { background: #050d2e; color: white; }
    /* rounded cards shadow */
    .rounded-xl, .rounded-2xl {
      box-shadow: 0 4px 24px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.12) !important;
    }
    /* amber/warning backgrounds */
    .bg-amber-50 { background: rgba(244,200,66,.1) !important; }
    .border-amber-200, .border-amber-300 { border-color: rgba(244,200,66,.35) !important; }
    .text-amber-900, .text-amber-800 { color: #fde68a !important; }
    .text-amber-700, .text-amber-400 { color: #fbbf24 !important; }
    /* blue info backgrounds */
    .bg-blue-50 { background: rgba(59,130,246,.1) !important; }
    .border-blue-200 { border-color: rgba(59,130,246,.3) !important; }
    .text-blue-900 { color: #bfdbfe !important; }
    /* red error */
    .bg-red-50 { background: rgba(192,21,26,.12) !important; }
    .border-red-200, .border-red-300, .border-red-400 { border-color: rgba(220,38,38,.45) !important; }
    .text-red-600, .text-red-700 { color: #fca5a5 !important; }
    /* green success */
    .bg-emerald-50, .bg-[#e6f4ec], .bg-[#e8f4ee] { background: rgba(0,105,64,.15) !important; }
    .text-[#006940], .text-[#005a30] { color: #6ee7b7 !important; }
    /* navy brand backgrounds */
    .bg-[#0d1b5e], .bg-[#162570] {
      background: rgba(13,27,94,.7) !important;
      backdrop-filter: blur(8px) !important;
    }
    .bg-[#f0f3fc], .bg-[#eef1fb] { background: rgba(255,255,255,.08) !important; }
    /* rank table rows */
    tr:hover { background: rgba(255,255,255,.04); }
    th { color: var(--text2) !important; border-color: var(--border) !important; }
    td { border-color: rgba(255,255,255,.06) !important; color: rgba(255,255,255,.9) !important; }
    /* scrollbars */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 4px; }

    /* ── Misc ── */
    .filters-sticky { position:sticky; top:58px; z-index:10; }
    .hidden { display:none; }
    .font-display { font-family:'Bebas Neue','Arial Narrow',sans-serif; letter-spacing:.04em; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    input[type=number] { -moz-appearance:textfield; }
    .pitch-bg { background: transparent; }

    /* ── Loading ── */
    #loading {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; flex-direction:column; gap:14px;
      background: linear-gradient(180deg, #2541b0 0%, #142772 30%, #0a1440 65%, #050b22 100%);
    }
    .spinner {
      width:40px; height:40px;
      border:3px solid rgba(255,255,255,.1);
      border-top-color: var(--green);
      border-right-color: var(--gold);
      border-radius:50%; animation:spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* MyPredictions rows - bez białej otoczki */
    .space-y-1\.5 > div { box-shadow: none !important; }

    span[style*="monospace"] { color: rgba(255,255,255,0.9) !important; }

    /* Usuń jasne hover */
    .hover\:bg-white\/10:hover { background: rgba(255,255,255,.10) !important; }
    .hover\:bg-white\/15:hover { background: rgba(255,255,255,.15) !important; }
    button:hover, [role="button"]:hover { background-color: rgba(255,255,255,.05) !important; }
    /* Wyjątek: przyciski z własnym kolorem */
    .bg-\[\#0d1b5e\]:hover { background: rgba(20,40,120,.8) !important; }
    .bg-amber-500:hover, .bg-amber-600:hover { background: rgba(180,100,0,.7) !important; }

    /* Nadpisania jasnych Tailwind bg na szklane */
    [class*="bg-sky-"], [class*="bg-blue-"],
    [class*="bg-purple-"], [class*="bg-rose-"],
    [class*="bg-indigo-"] {
      background: rgba(255,255,255,.08) !important;
      color: rgba(255,255,255,.9) !important;
    }
    [class*="bg-amber-50"], [class*="bg-amber-100"] {
      background: rgba(180,100,0,.25) !important;
      color: rgba(255,255,255,.9) !important;
    }
    [class*="text-sky-"], [class*="text-blue-"],
    [class*="text-purple-"], [class*="text-indigo-"],
    [class*="text-rose-"] { color: rgba(255,255,255,.9) !important; }

    /* Dodatkowe wymuszenia białego tekstu */
    .font-semibold, .font-bold, .font-medium,
    h1, h2, h3, h4, h5, h6,
    .font-display,
    label, th,
    [class*="text-"] { color: rgba(255,255,255,.92) !important; }
    /* Wyjątki — elementy które mają własne kolory brandowe */
    .text-amber-400, .text-amber-300 { color: #fcd34d !important; }
    .text-[#fde68a] { color: #fde68a !important; }
    .text-red-600, .text-red-700, .text-[#fca5a5] { color: #fca5a5 !important; }
    .text-[#6ee7b7] { color: #6ee7b7 !important; }
    /* Przyciski primary — white text */
    .bg-[#0d1b5e] { color: white !important; }
    /* Badge wariant */
    [class*="bg-amber"] { color: #92400e !important; }
    [class*="bg-red"] { color: #991b1b !important; }

  </style>

// ═══════════════════════════════════════════════════════════════
//  FIREBASE STATE HOOK (zamiennik window.storage)
// ═══════════════════════════════════════════════════════════════
function useFirebaseState(path, defaultValue) {
  const [value, setValue] = useState(defaultValue);
  const [loaded, setLoaded] = useState(false);
  const valueRef = useRef(defaultValue);

  useEffect(() => {
    const ref = db.ref(path);
    const timeout = setTimeout(() => {
      console.warn('Firebase timeout for path:', path, '— using default');
      setLoaded(true);
    }, 8000);
    const handler = ref.on('value', (snap) => {
      clearTimeout(timeout);
      const data = snap.val();
      if (data !== null && data !== undefined) {
        valueRef.current = data;
        setValue(data);
      } else {
        valueRef.current = defaultValue;
        setValue(defaultValue);
      }
      setLoaded(true);
    }, (err) => { clearTimeout(timeout); console.error('Firebase read error:', path, err); setLoaded(true); });
    return () => { clearTimeout(timeout); ref.off('value', handler); };
  }, [path]);

  const updateValue = useCallback(async (next) => {
    const resolved = typeof next === 'function' ? next(valueRef.current) : next;
    valueRef.current = resolved;
    setValue(resolved);
    try { await db.ref(path).set(resolved); }
    catch(e) { console.error('Firebase write error:', path, e); }
  }, [path]);

  return [value, updateValue, loaded];
}

function scoreGroupMatch(pred, result) {
  if(!pred||!result) return 0;
  if(pred.home===result.home&&pred.away===result.away) return POINTS.group.exact;
  const po=pred.home>pred.away?'h':pred.home<pred.away?'a':'d';
  const ro=result.home>result.away?'h':result.home<result.away?'a':'d';
  return po===ro?POINTS.group.winner:0;
}
function scoreKnockoutMatch(pred, result) {
  if(!pred||!result) return 0;
  const exact=pred.home===result.home&&pred.away===result.away;
  let predictedAdv=pred.home>pred.away?'home':pred.home<pred.away?'away':(pred.penWinner||null);
  let base=exact?POINTS.knockout.exact:(predictedAdv&&predictedAdv===result.advancingTeam?POINTS.knockout.winner:0);
  let bonus=(result.pensHappened&&pred.penWinner&&pred.penWinner===result.advancingTeam)?POINTS.knockout.penBonus:0;
  return base+bonus;
}
function scoreMatch(pred, result, phase) {
  return phase==='group'?scoreGroupMatch(pred,result):scoreKnockoutMatch(pred,result);
}
function predictionQuality(pred, result, phase) {
  if(!pred||!result) return null;
  const pts=scoreMatch(pred,result,phase);
  return pts>=(phase==='group'?3:5)?'exact':pts>0?'partial':'miss';
}
function scoreSpecials(special, results) {
  if(!special||!results) return {groupOrders:0,podium:0,awards:0,total:0};
  let groupOrders=0,podium=0,awards=0;
  GROUPS.forEach(g => {
    const p=special.groupOrders?.[g]||[], r=results.groupOrders?.[g]||[];
    if(!r.some(Boolean)) return;
    const exact=p.filter((t,i)=>t&&r[i]&&t===r[i]).length;
    if(exact===4) groupOrders+=POINTS.groupOrderAll;
    else if(exact===2) groupOrders+=POINTS.groupOrderTwo;
    else if(exact===1) groupOrders+=POINTS.groupOrderOne;
  });
  if(special.champion&&results.champion&&special.champion===results.champion) podium+=POINTS.champion;
  if(special.runnerUp&&results.runnerUp&&special.runnerUp===results.runnerUp) podium+=POINTS.runnerUp;
  if(special.third&&results.third&&special.third===results.third) podium+=POINTS.third;
  const n=s=>(s||'').trim().toLowerCase();
  if(special.topScorer&&results.topScorer&&n(special.topScorer)===n(results.topScorer)) awards+=POINTS.topScorer;
  if(special.mvp&&results.mvp&&n(special.mvp)===n(results.mvp)) awards+=POINTS.mvp;
  return {groupOrders,podium,awards,total:groupOrders+podium+awards};
}

function formatDate(iso) {
  // Zawsze wyświetlamy w czasie polskim (CEST = Europe/Warsaw = UTC+2 latem)
  const d = new Date(iso);
  try {
    const fmt = new Intl.DateTimeFormat('pl-PL', {
      timeZone: 'Europe/Warsaw',
      weekday: 'short', day: 'numeric', month: 'short',
      hour: '2-digit', minute: '2-digit', hour12: false
    });
    const parts = fmt.formatToParts(d).reduce((a,{type,value})=>({...a,[type]:value}),{});
    return `${parts.weekday} ${parts.day} ${parts.month} • ${parts.hour}:${parts.minute}`;
  } catch(e) {
    // fallback – czas UTC+2 ręcznie
    const pl = new Date(d.getTime() + 2*3600*1000);
    const days=['Nd','Pn','Wt','Śr','Cz','Pt','Sb'];
    const months=['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];
    return `${days[pl.getUTCDay()]} ${pl.getUTCDate()} ${months[pl.getUTCMonth()]} • ${String(pl.getUTCHours()).padStart(2,'0')}:${String(pl.getUTCMinutes()).padStart(2,'0')}`;
  }
}
function uid() { return 'p_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }
const hashPin=hashPwd; // alias — ten sam algorytm
function hashPwd(s) {
  if(!s) return '';
  let h=0; for(let i=0;i<s.length;i++) h=((h<<5)-h+s.charCodeAt(i))|0;
  return 'h_'+Math.abs(h).toString(36)+'_'+s.length;
}

          <div className="flex items-center justify-between gap-2">
            <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
              <FlagImg code={home?.flag} size={32} title={home?.name}/>
              <span style={{fontSize:11.5,fontWeight:700,color:'rgba(255,255,255,.85)',textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>{home?.name||'TBD'}</span>
            </div>
            <div style={{padding:'5px 14px',borderRadius:10,background:'rgba(255,255,255,.12)',backdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,.22)',fontFamily:'Bebas Neue,sans-serif',fontSize:22,color:'white',minWidth:68,textAlign:'center',letterSpacing:'0.04em',flexShrink:0}}>
              {result?`${result.home}:${result.away}`:prediction?`${prediction.home}:${prediction.away}`:'vs'}
            </div>
            <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
              <FlagImg code={away?.flag} size={32} title={away?.name}/>
              <span style={{fontSize:11.5,fontWeight:700,color:'rgba(255,255,255,.85)',textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>{away?.name||'TBD'}</span>
            </div>
          </div>
        </div>
        <div className="flex items-center gap-3 mt-2 text-[11px] text-stone-500">
          <span className="inline-flex items-center gap-1"><Icon name="calendar" size={11}/>{formatDate(match.date)}</span>
          <span className="inline-flex items-center gap-1"><Icon name="mappin" size={11}/>{match.city}</span>
        </div>
      </button>

      {expanded&&(
        <div className="px-3 sm:px-4 pb-4 pt-2 border-t border-stone-100 bg-stone-50/50">
          {!activePlayerId&&(
            <div className="text-center text-sm text-stone-600 bg-amber-50 border border-amber-200 rounded-lg p-3">
              <Icon name="alert" size={16} className="inline mr-1"/>Wybierz uczestnika na górze ekranu
            </div>
          )}
          {activePlayerId&&!teamsAssigned&&(
            <div className="text-center text-sm text-stone-600 bg-stone-100 border border-stone-200 rounded-lg p-3">
              Drużyny tego meczu nie zostały jeszcze przypisane przez admina.
            </div>
          )}
          {activePlayerId&&teamsAssigned&&(
            <>
              <div className="my-3">
                {/* flaga+nazwa — VS — flaga+nazwa */}
                <div className="flex items-center justify-between gap-2 mb-3">
                  <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
                    <FlagImg code={home.flag} size={30} title={home.name}/>
                    <span style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.85)',textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>{home.name}</span>
                  </div>
                  <span style={{fontSize:10.5,fontWeight:700,color:'rgba(255,255,255,.32)',flexShrink:0,letterSpacing:'0.06em'}}>VS</span>
                  <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
                    <FlagImg code={away.flag} size={30} title={away.name}/>
                    <span style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.85)',textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>{away.name}</span>
                  </div>
                </div>
                {/* pola wyniku */}
                <div className="flex items-center justify-center gap-1">
                  <ScoreInput value={draft.home} onChange={n=>setDraft(d=>({...d,home:n}))} disabled={locked}/>
                  <span className="font-display text-2xl" style={{color:'rgba(255,255,255,.45)'}}>:</span>
                  <ScoreInput value={draft.away} onChange={n=>setDraft(d=>({...d,away:n}))} disabled={locked}/>
                </div>
              </div>

              {needsPen&&(
                <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-3">
                  <p className="text-xs font-semibold text-amber-900 mb-2">💡 W pucharach nie ma remisów — kto wygra karne?</p>
                  <div className="flex gap-2">
                    {['home','away'].map(side=>{
                      const t=side==='home'?home:away; const sel=draft.penWinner===side;
                      return <button key={side} type="button" onClick={()=>setDraft(d=>({...d,penWinner:side}))} disabled={locked}
                        className={`flex-1 px-3 py-2 rounded-lg border-2 text-sm font-semibold transition-all disabled:opacity-60 ${sel?'border-amber-500 bg-amber-100 text-amber-900':'border-stone-200 bg-white text-stone-700 hover:border-amber-300'}`}>
                        {t.name}
                      </button>;
                    })}
                  </div>
                  <p className="text-[10px] text-amber-700 mt-2">Trafione karne = <strong>+1 pkt bonus</strong>, jeśli karne się odbędą.</p>
                </div>
              )}

              {locked&&result&&(
                <div className="bg-stone-900 text-white rounded-lg p-3 mb-3 text-center">
                  <div className="text-[10px] uppercase tracking-wider text-stone-400 mb-1">Wynik końcowy</div>
                  <div className="font-display text-3xl tracking-wider">{result.home} : {result.away}</div>
                  {result.pensHappened&&result.advancingTeam&&(
                    <div className="text-xs text-amber-300 mt-1">
                      Awans po karnych: {(result.advancingTeam==='home'?home:away).name}
                    </div>
                  )}
                  {prediction&&(
                    <div className="mt-2 pt-2 border-t border-stone-700 text-sm">
                      Twój typ: <strong className="font-display text-base">{prediction.home}:{prediction.away}</strong>
                      {prediction.penWinner&&<span className="text-stone-400 ml-1">(karne: {(prediction.penWinner==='home'?home:away).name})</span>}
                      <span className={`ml-2 font-bold ${quality==='exact'?'text-[#6080d0]':quality==='partial'?'text-amber-400':'text-stone-400'}`}>
                        <span style={{color:quality==='exact'?'#4ade80':quality==='partial'?'#fbbf24':'#f87171',fontWeight:800}}>{myPoints>0?`+${myPoints} pkt`:'0 pkt'}</span>
                      </span>
                    </div>
                  )}
                </div>
              )}

              {phaseLocked&&!result&&(
                <div className="text-center text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg p-3 flex items-center justify-center gap-2">
                  <Icon name="lock" size={16}/><span>Typowanie tej fazy zostało zamknięte przez admina.</span>
                </div>
              )}
              {!locked&&(
                <div className="space-y-2">
                  {needsPin&&(
                    <div>
                      <input type="password" inputMode="numeric" value={pin}
                        onChange={e=>{setPin(e.target.value);setPinErr('');}}
                        placeholder="Wpisz swój PIN"
                        maxLength={8}
                        className={`w-full px-3 py-2.5 border-2 rounded-lg focus:outline-none text-sm text-center tracking-widest ${pinErr?'border-red-400 bg-red-50':'border-stone-200 focus:border-[#0d1b5e]'}`}/>
                      {pinErr&&<p className="text-xs text-red-600 font-semibold mt-1 text-center">{pinErr}</p>}
                    </div>
                  )}
                  <Btn variant="primary"
                    onClick={()=>onSavePrediction(match.id,{home:draft.home,away:draft.away,penWinner:needsPen?draft.penWinner:null},pin,(err)=>setPinErr(err))}
                    disabled={!canSave||(needsPin&&pin.length<4)}
                    className="w-full" size="lg">
                    <Icon name="save" size={16}/>{prediction?'Zaktualizuj typ':'Zapisz typ'}
                  </Btn>
                </div>
              )}

              {locked&&allPredictions&&players&&(
                <div className="mt-4 pt-3 border-t border-stone-200">
                  <p className="text-[10px] uppercase tracking-wider font-bold text-stone-500 mb-2">Typy wszystkich graczy</p>
                  <div className="space-y-1">
                    {players.map(pl=>{
                      const pp=allPredictions[`${pl.id}:${match.id}`];
                      if(!pp) return <div key={pl.id} className="flex justify-between text-xs py-1 px-2 rounded bg-stone-100"><span className="text-stone-600">{pl.name}</span><span className="text-stone-400 italic">brak</span></div>;
                      const q=predictionQuality(pp,result,match.phase);
                      const pts=scoreMatch(pp,result,match.phase);
                      const bgStyle=q==='exact'?{background:'rgba(0,160,60,.30)',border:'1px solid rgba(0,220,80,.45)',color:'white'}:q==='partial'?{background:'rgba(200,100,0,.30)',border:'1px solid rgba(220,140,0,.45)',color:'white'}:result?{background:'rgba(180,0,0,.28)',border:'1px solid rgba(220,0,0,.40)',color:'white'}:{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',color:'rgba(255,255,255,.7)'};
                      return <div key={pl.id} style={{...bgStyle,display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',borderRadius:8,marginBottom:3}}>
                        <span style={{fontWeight:600,fontSize:13}}>{pl.name}</span>
                        <span style={{fontFamily:'monospace',fontSize:13,display:'flex',alignItems:'center',gap:6}}>
                          <strong>{pp.home}:{pp.away}</strong>
                          {pp.penWinner&&<span style={{opacity:.7,fontSize:11}}>[k:{(pp.penWinner==='home'?home:away)?.name?.slice(0,3)}]</span>}
                          <span style={{fontWeight:800,color:pts>=3?'#4ade80':pts>0?'#fbbf24':'#f87171'}}>{pts>0?`+${pts}`:'0'}</span>
                        </span>
                      </div>;
                    })}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

//  WIDOK: MECZE
// ═══════════════════════════════════════════════════════════════
function MatchesView({matches,teams,predictions,results,players,activePlayerId,phaseLocks,onSavePrediction}) {
  const [phaseFilter,setPhaseFilter]=useState('all');
  const [groupFilter,setGroupFilter]=useState('all');
  const [statusFilter,setStatusFilter]=useState('all');
  const [expandedId,setExpandedId]=useState(null);

  const filtered=useMemo(()=>{
    return matches.filter(m=>{
      if(phaseFilter!=='all'&&m.phase!==phaseFilter) return false;
      if(phaseFilter==='group'&&groupFilter!=='all'&&m.group!==groupFilter) return false;
      if(statusFilter==='pending'&&results[m.id]) return false;
      if(statusFilter==='done'&&!results[m.id]) return false;
      return true;
    }).sort((a,b)=>PHASE_ORDER.indexOf(a.phase)-PHASE_ORDER.indexOf(b.phase)||a.num-b.num);
  },[matches,phaseFilter,groupFilter,statusFilter,results]);

  const filterBtns=[{k:'all',l:'Wszystkie'},{k:'group',l:'Grupowa'},{k:'r32',l:'1/16'},{k:'r16',l:'1/8'},{k:'qf',l:'1/4'},{k:'sf',l:'1/2'},{k:'third',l:'3. m.'},{k:'final',l:'Finał'}];

  return (
    <div className="space-y-3">
      <div className="bg-white border border-[#b0bce8] rounded-xl p-3 filters-sticky shadow-sm">
        <div className="flex flex-col gap-2">
          <div className="flex gap-1 overflow-x-auto pb-1">
            {filterBtns.map(t=><button key={t.k} onClick={()=>setPhaseFilter(t.k)}
              className={`shrink-0 px-3 py-1.5 rounded-lg text-xs font-semibold ${phaseFilter===t.k?'bg-[#0d1b5e] text-white':'bg-stone-100 text-stone-700 hover:bg-white/15'}`}>{t.l}</button>)}
          </div>
          {phaseFilter==='group'&&(
            <div className="flex gap-1 overflow-x-auto pb-1">
              <button onClick={()=>setGroupFilter('all')} className={`shrink-0 px-2.5 py-1 rounded text-xs font-bold ${groupFilter==='all'?'bg-stone-900 text-white':'bg-stone-100 text-stone-600'}`}>Wszystkie</button>
              {GROUPS.map(g=><button key={g} onClick={()=>setGroupFilter(g)} className={`shrink-0 w-8 h-7 rounded text-xs font-bold ${groupFilter===g?'bg-stone-900 text-white':'bg-stone-100 text-stone-600'}`}>{g}</button>)}
            </div>
          )}
          <div className="flex gap-1">
            {[{k:'all',l:'Wszystkie'},{k:'pending',l:'Nadchodzące'},{k:'done',l:'Zakończone'}].map(t=>(
              <button key={t.k} onClick={()=>setStatusFilter(t.k)} className={`flex-1 px-2 py-1 rounded text-xs font-medium ${statusFilter===t.k?'bg-stone-800 text-white':'bg-stone-100 text-stone-600'}`}>{t.l}</button>
            ))}
          </div>
        </div>
        <div className="text-[11px] text-stone-500 mt-2 text-center">{filtered.length} meczów</div>
      </div>
      {filtered.map(m=>(
        <MatchCard key={m.id} match={m} teams={teams}
          prediction={predictions[`${activePlayerId}:${m.id}`]}
          result={results[m.id]} allPredictions={predictions}
          players={players} activePlayerId={activePlayerId}
          phaseLocks={phaseLocks}
          onSavePrediction={onSavePrediction}
          expanded={expandedId===m.id}
          onToggle={()=>setExpandedId(expandedId===m.id?null:m.id)}/>
      ))}
      {filtered.length===0&&<div className="text-center text-stone-500 py-12">Brak meczów dla wybranych filtrów</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  WIDOK: TYPY SPECJALNE
// ═══════════════════════════════════════════════════════════════
function SpecialsView({teams,players,activePlayerId,specialPredictions,specialResults,onSaveSpecial,tournamentLocked,specialsLocked}) {
  const mine=specialPredictions[activePlayerId]||{groupOrders:{},champion:'',runnerUp:'',third:'',topScorer:'',mvp:''};
  const [draft,setDraft]=useState(mine);
  const [activeGroup,setActiveGroup]=useState('A');
  const [pin,setPin]=useState('');
  const [pinErr,setPinErr]=useState('');
  const [validErr,setValidErr]=useState('');
  useEffect(()=>{setDraft(specialPredictions[activePlayerId]||{groupOrders:{},champion:'',runnerUp:'',third:'',topScorer:'',mvp:''});setPin('');setPinErr('');setValidErr('');},[activePlayerId,specialPredictions]);

  const validate=()=>{
    // Sprawdź kolejność we wszystkich grupach
    for(const g of GROUPS){
      const order=draft.groupOrders[g]||[];
      const filled=order.filter(Boolean);
      if(filled.length<4) return `Uzupełnij kolejność wszystkich 4 drużyn w grupie ${g}`;
      if(new Set(filled).size<4) return `W grupie ${g} ta sama drużyna jest wybrana więcej niż raz`;
    }
    if(!draft.champion) return 'Wybierz zwycięzcę turnieju';
    if(!draft.runnerUp) return 'Wybierz 2. miejsce turnieju';
    if(!draft.third)    return 'Wybierz 3. miejsce turnieju';
    if(draft.champion===draft.runnerUp||draft.champion===draft.third||draft.runnerUp===draft.third)
      return 'Podium — każde miejsce musi być inną drużyną';
    if(!(draft.topScorer||'').trim()) return 'Wpisz króla strzelców';
    if(!(draft.mvp||'').trim())       return 'Wpisz MVP turnieju';
    return null;
  };
  const activePl=players&&players.find&&players.find(p=>p.id===activePlayerId);
  const needsPin=!!(activePl&&activePl.pinHash);
  const teamOptions=useMemo(()=>Object.values(teams).filter(Boolean).sort((a,b)=>a.name.localeCompare(b.name)),[teams]);
  const teamsOfGroup=g=>Object.values(teams).filter(t=>t&&t.group===g);
  const setGroupOrder=(g,pos,teamId)=>{
    setDraft(d=>{
      const order=[...(d.groupOrders[g]||[null,null,null,null])];
      for(let i=0;i<4;i++) if(order[i]===teamId)order[i]=null;
      order[pos]=teamId;
      return {...d,groupOrders:{...d.groupOrders,[g]:order}};
    });
  };
  const myScores=useMemo(()=>scoreSpecials(mine,specialResults),[mine,specialResults]);
  const hasResults=!!(specialResults?.champion||specialResults?.topScorer||Object.keys(specialResults?.groupOrders||{}).length>0);
  if(!activePlayerId) return <div className="text-center text-sm text-stone-600 bg-amber-50 border border-amber-200 rounded-lg p-4 mt-4">Wybierz uczestnika na górze ekranu</div>;

  return (
    <div className="space-y-4">
      {(tournamentLocked||specialsLocked)&&(
        <div className="bg-[#0d1b5e] text-white rounded-lg p-3 text-sm flex items-center gap-2 mb-3">
          <Icon name="lock" size={16} className="text-amber-400"/>
          <span>{specialsLocked&&!tournamentLocked?'Typowanie specjalne zostało zamknięte przez admina.':'Typy specjalne są zablokowane — turniej już się rozpoczął.'}</span>
        </div>
      )}


      <section className="bg-white border border-stone-200 rounded-xl p-4">
        <h3 className="font-display text-lg tracking-wide text-stone-900 mb-1">Kolejność w grupach</h3>
        <p className="text-xs text-stone-500 mb-3">1 trafione: 3 pkt • 2 trafione: 6 pkt • wszystkie 4: 10 pkt</p>
        <div className="flex gap-1 overflow-x-auto pb-2 mb-3">
          {GROUPS.map(g=><button key={g} onClick={()=>setActiveGroup(g)} className={`shrink-0 w-10 h-10 rounded-lg font-bold ${activeGroup===g?'bg-[#0d1b5e] text-white':'bg-stone-100 text-stone-700'}`}>{g}</button>)}
        </div>
        {[0,1,2,3].map(pos=>{
          const placeName=['1. miejsce','2. miejsce','3. miejsce','4. miejsce'][pos];
          const order=draft.groupOrders[activeGroup]||[];
          const selected=order[pos];
          const realOrder=specialResults?.groupOrders?.[activeGroup]||[];
          const isCorrect=hasResults&&realOrder[pos]&&realOrder[pos]===selected;
          return (
            <div key={pos} className="border-2 rounded-lg p-2 mb-2 border-stone-200 bg-stone-50" style={isCorrect?{background:'rgba(0,160,60,.30)',borderColor:'rgba(0,220,80,.45)'}:hasResults&&realOrder[pos]&&selected&&!isCorrect?{background:'rgba(180,0,0,.28)',borderColor:'rgba(220,0,0,.40)'}:{}}>
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-xs font-bold text-stone-700">{placeName}</span>
                {isCorrect&&<Badge variant="success">✓</Badge>}
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-1.5">
                {teamsOfGroup(activeGroup).map(t=>{
                  const sel=selected===t.id;
                  const correct=sel&&isCorrect;
                  const wrong=sel&&hasResults&&realOrder[pos]&&!isCorrect;
                  return <button key={t.id} onClick={()=>setGroupOrder(activeGroup,pos,t.id)} disabled={tournamentLocked||specialsLocked}
                    style={correct?{background:'rgba(0,160,60,.30)',borderColor:'rgba(0,220,80,.45)',color:'#4ade80'}:wrong?{background:'rgba(180,0,0,.28)',borderColor:'rgba(220,0,0,.40)',color:'#f87171'}:{}}
                    className={`px-2 py-2 rounded text-xs font-semibold border transition-all disabled:opacity-60 ${correct||wrong?'':sel?'bg-[#0d1b5e] text-white border-[#0d1b5e]':'bg-white text-stone-700 border-stone-200 hover:border-[#4060c0]'}`}>
                    {t.name}
                  </button>;
                })}
              </div>
            </div>
          );
        })}
      </section>

      <section className="bg-white border border-stone-200 rounded-xl p-4">
        <h3 className="font-display text-lg tracking-wide text-stone-900 mb-3">Podium turnieju</h3>
        {[{key:'champion',label:'Zwycięzca',pts:POINTS.champion},{key:'runnerUp',label:'2. miejsce',pts:POINTS.runnerUp},{key:'third',label:'3. miejsce',pts:POINTS.third}].map(item=>{
          const realVal=specialResults?.[item.key];
          const isCorrect=realVal&&draft[item.key]===realVal;
          return (
            <div key={item.key} className="mb-3 last:mb-0">
              <label className="text-xs font-semibold text-stone-700 flex items-center gap-1.5 mb-1.5">
                {item.label} <span className="text-stone-400">({item.pts} pkt)</span>
                {isCorrect&&<Badge variant="success">+{item.pts}</Badge>}
              </label>
              <select value={draft[item.key]||''} onChange={e=>setDraft(d=>({...d,[item.key]:e.target.value}))} disabled={tournamentLocked||specialsLocked}
                className={`w-full px-3 py-2.5 border-2 rounded-lg focus:outline-none text-sm bg-white disabled:bg-stone-100 ${isCorrect?'border-[#4060c0]':'border-stone-200 focus:border-[#0d1b5e]'}`}>
                <option value="">— wybierz drużynę —</option>
                {teamOptions.map(t=><option key={t.id} value={t.id}>{t.name} (gr. {t.group})</option>)}
              </select>
            </div>
          );
        })}
      </section>

      <section className="bg-white border border-stone-200 rounded-xl p-4">
        <h3 className="font-display text-lg tracking-wide text-stone-900 mb-3">Nagrody indywidualne</h3>
        <div className="mb-3">
          <label className="text-xs font-semibold text-stone-700 flex items-center gap-1.5 mb-1.5"><Icon name="target" size={16} className="text-[#0d1b5e]"/>Król strzelców <span className="text-stone-400">({POINTS.topScorer} pkt)</span></label>
          <AutocompleteInput value={draft.topScorer} onChange={v=>setDraft(d=>({...d,topScorer:v}))} suggestions={STAR_PLAYERS} placeholder="np. Kylian Mbappé" disabled={tournamentLocked||specialsLocked}/>
        </div>
        <div>
          <label className="text-xs font-semibold text-stone-700 flex items-center gap-1.5 mb-1.5"><Icon name="sparkles" size={16} className="text-amber-500"/>MVP turnieju <span className="text-stone-400">({POINTS.mvp} pkt)</span></label>
          <AutocompleteInput value={draft.mvp} onChange={v=>setDraft(d=>({...d,mvp:v}))} suggestions={STAR_PLAYERS} placeholder="np. Jude Bellingham" disabled={tournamentLocked||specialsLocked}/>
        </div>
      </section>

      {!(tournamentLocked||specialsLocked)&&(
        <div className="space-y-2 mt-2">
          {validErr&&(
            <div className="bg-red-50 border-2 border-red-400 rounded-xl p-3 flex items-start gap-2">
              <span className="text-red-500 text-lg shrink-0">⚠️</span>
              <div>
                <p className="text-sm font-bold text-red-700 uppercase tracking-wide">Uzupełnij wszystkie dane</p>
                <p className="text-xs text-red-600 mt-0.5">{validErr}</p>
              </div>
            </div>
          )}
          {needsPin&&(
            <div>
              <input type="password" inputMode="numeric" value={pin}
                onChange={e=>{setPin(e.target.value);setPinErr('');}}
                placeholder="Wpisz swój PIN, żeby zapisać"
                maxLength={8}
                className={`w-full px-3 py-2.5 border-2 rounded-lg focus:outline-none text-sm text-center tracking-widest ${pinErr?'border-red-400 bg-red-50':'border-stone-200 focus:border-[#0d1b5e]'}`}/>
              {pinErr&&<p className="text-xs text-red-600 font-semibold mt-1 text-center">{pinErr}</p>}
            </div>
          )}
          <Btn variant="primary" size="lg"
            onClick={()=>{
              const err=validate();
              if(err){setValidErr(err);window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});return;}
              setValidErr('');
              onSaveSpecial(activePlayerId,draft,pin,(err)=>setPinErr(err));
            }}
            disabled={needsPin&&pin.length<4}
            className="w-full">
            <Icon name="save" size={18}/>Zapisz typy specjalne

        <div className="bg-[#0d1b5e] text-white rounded-xl p-4">
          <h4 className="font-display text-base tracking-wide mb-2 text-[#c8d4f4]">Twoje punkty specjalne</h4>
          <div className="grid grid-cols-3 gap-2 text-center">
            <div><div className="text-2xl font-display">{myScores.groupOrders}</div><div className="text-[10px] uppercase text-[#a0b4e8]">Grupy</div></div>
            <div><div className="text-2xl font-display">{myScores.podium}</div><div className="text-[10px] uppercase text-[#a0b4e8]">Podium</div></div>
            <div><div className="text-2xl font-display">{myScores.awards}</div><div className="text-[10px] uppercase text-[#a0b4e8]">Nagrody</div></div>
          </div>
          <div className="text-center mt-2 pt-2 border-t border-[#162570]">
            <span className="text-3xl font-display">{myScores.total}</span><span className="text-sm text-[#a0b4e8] ml-1">pkt łącznie</span>
          </div>
        </div>
      )}
    </div>
  );
}

function SpecialsAllView({players,specialPredictions,specialResults,teams}) {
  const [selGroup,setSelGroup]=useState('A');
  const hasResults=!!(specialResults?.champion||specialResults?.topScorer||Object.keys(specialResults?.groupOrders||{}).length>0);
  const teamName=(id)=>teams[id]?.name||id;
  const teamFlag=(id)=>teams[id]?.flag||'';
  const teamAbbr=(id)=>{
    const flag=teamFlag(id);
    if(flag&&FLAG_ABBR[flag.toLowerCase()]) return FLAG_ABBR[flag.toLowerCase()];
    // fallback: szukaj po polskiej nazwie
    const name=teamName(id);
    if(name&&name!==id){
      const abbr=NAME_TO_ABBR[name.toLowerCase()];
      if(abbr) return abbr;
    }
    return name&&name!==id?name.slice(0,3).toUpperCase():'???';
  };

  return (
    <div className="space-y-3">
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-900">
        Typy specjalne wszystkich uczestników — widoczne dla każdego.
      </div>

      {/* Kolejność grup */}
      <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
        <div className="bg-[#0d1b5e] text-white px-4 py-2.5 text-sm font-bold tracking-wide flex items-center justify-between">
          <span>Kolejność w grupach</span>
        </div>
        <div className="flex gap-1 p-2 overflow-x-auto">
          {GROUPS.map(g=><button key={g} onClick={()=>setSelGroup(g)} className={`shrink-0 w-9 h-9 rounded-lg text-sm font-bold ${selGroup===g?'bg-[#0d1b5e] text-white':'bg-stone-100 text-stone-700'}`}>{g}</button>)}
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-stone-50 border-b border-stone-200">
                <th className="px-3 py-2 text-left font-semibold text-stone-600">Gracz</th>
                {[1,2,3,4].map(pos=><th key={pos} className="px-2 py-2 text-center font-semibold text-stone-600">{pos}.</th>)}
              </tr>
            </thead>
            <tbody>
              {players.map(pl=>{
                const order=(specialPredictions[pl.id]?.groupOrders||{})[selGroup]||[];
                const real=(specialResults?.groupOrders||{})[selGroup]||[];
                return (
                  <tr key={pl.id} className="border-b border-stone-100 last:border-0">
                    <td className="px-3 py-2 font-semibold text-stone-800 truncate max-w-[100px]">{pl.name}</td>
                    {[0,1,2,3].map(i=>{
                      const tid=order[i];
                      const isOk=hasResults&&real[i]&&tid&&real[i]===tid;
                      const isWrong=hasResults&&real[i]&&tid&&real[i]!==tid;
                      const cellStyle=isOk?{background:'rgba(0,160,60,.30)',border:'1px solid rgba(0,220,80,.45)'}:isWrong?{background:'rgba(180,0,0,.28)',border:'1px solid rgba(220,0,0,.40)'}:{};
                      return <td key={i} className="px-2 py-2 text-center" style={cellStyle}>
                        {tid?<span style={{fontSize:11,fontWeight:800,color:'rgba(255,255,255,0.9)',fontFamily:'monospace',letterSpacing:'0.04em',verticalAlign:'middle'}} title={teamName(tid)}>{teamAbbr(tid)}</span>:<span className="text-stone-300">—</span>}
                      </td>;
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Podium */}
      <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
        <div className="bg-[#0d1b5e] text-white px-4 py-2.5 text-sm font-bold tracking-wide">Podium turnieju</div>
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-stone-50 border-b border-stone-200">
                <th className="px-3 py-2 text-left font-semibold text-stone-600">Gracz</th>
                <th className="px-2 py-2 text-center">🥇</th>
                <th className="px-2 py-2 text-center">🥈</th>
                <th className="px-2 py-2 text-center">🥉</th>
              </tr>
            </thead>
            <tbody>
              {players.map(pl=>{
                const sp=specialPredictions[pl.id]||{};
                const chk=(key)=>hasResults&&specialResults?.[key]&&sp[key]===specialResults[key];
                return (
                  <tr key={pl.id} className="border-b border-stone-100 last:border-0">
                    <td className="px-3 py-2 font-semibold text-stone-800 truncate max-w-[100px]">{pl.name}</td>
                    {['champion','runnerUp','third'].map(key=>{
                      const isOk=chk(key);
                      const isWrong=hasResults&&specialResults?.[key]&&sp[key]&&sp[key]!==specialResults[key];
                      const cellStyle=isOk?{background:'rgba(0,160,60,.30)',border:'1px solid rgba(0,220,80,.45)'}:isWrong?{background:'rgba(180,0,0,.28)',border:'1px solid rgba(220,0,0,.40)'}:{};

        <div className="bg-[#0d1b5e] text-white px-4 py-2.5 text-sm font-bold tracking-wide">Nagrody indywidualne</div>

                <th className="px-3 py-2 text-left font-semibold text-stone-600">Gracz</th>

              </tr>
            </thead>
            <tbody>
              {players.map(pl=>{
                const sp=specialPredictions[pl.id]||{};
                const norm=s=>(s||'').trim().toLowerCase();
                const okScorer=hasResults&&specialResults?.topScorer&&norm(sp.topScorer)===norm(specialResults.topScorer);
                const okMvp=hasResults&&specialResults?.mvp&&norm(sp.mvp)===norm(specialResults.mvp);
                return (
                  <tr key={pl.id} className="border-b border-stone-100 last:border-0">
                    <td className="px-3 py-2 font-semibold text-stone-800 truncate max-w-[80px]">{pl.name}</td>
                    <td className="px-3 py-2" style={okScorer?{background:'rgba(0,160,60,.30)',border:'1px solid rgba(0,220,80,.45)'}:hasResults&&specialResults?.topScorer&&sp.topScorer&&!okScorer?{background:'rgba(180,0,0,.28)',border:'1px solid rgba(220,0,0,.40)'}:{}}>{sp.topScorer||<span className="text-stone-300">—</span>}</td>
                    <td className="px-3 py-2" style={okMvp?{background:'rgba(0,160,60,.30)',border:'1px solid rgba(0,220,80,.45)'}:hasResults&&specialResults?.mvp&&sp.mvp&&!okMvp?{background:'rgba(180,0,0,.28)',border:'1px solid rgba(220,0,0,.40)'}:{}}>{sp.mvp||<span className="text-stone-300">—</span>}</td>
                  </tr>

          </table>
        </div>
      </div>
    </div>
  );
}

//  WIDOK: RANKING
// ═══════════════════════════════════════════════════════════════
function LeaderboardView({players,matches,predictions,results,specialPredictions,specialResults}) {
  const ranking=useMemo(()=>{
    return players.map(pl=>{
      let gm=0,km=0,exact=0,partial=0;
      matches.forEach(m=>{
        const pred=predictions[`${pl.id}:${m.id}`], res=results[m.id];
        if(!pred||!res) return;
        const pts=scoreMatch(pred,res,m.phase); const q=predictionQuality(pred,res,m.phase);
        if(q==='exact')exact++; else if(q==='partial')partial++;
        if(m.phase==='group')gm+=pts; else km+=pts;
      });
      const sp=scoreSpecials(specialPredictions[pl.id],specialResults);
      return {player:pl,gm,km,specials:sp.total,go:sp.groupOrders,podium:sp.podium,awards:sp.awards,total:gm+km+sp.total,exact,partial};
    }).sort((a,b)=>b.total-a.total||b.exact-a.exact);
  },[players,matches,predictions,results,specialPredictions,specialResults]);

  if(players.length===0) return <div className="text-center text-stone-600 bg-stone-100 border border-stone-200 rounded-lg p-6">Brak graczy.</div>;
  const maxTotal=Math.max(...ranking.map(r=>r.total),1);
  return (
    <div className="space-y-2">
      <div className="bg-gradient-to-br from-[#0d1b5e] via-[#162570] to-[#1a1a3a] text-white rounded-xl p-4">
        <h3 className="font-display text-2xl tracking-wider flex items-center gap-2"><Icon name="trophy" size={22} className="text-amber-400"/>Klasyfikacja</h3>
        <p className="text-xs text-[#c8d4f4] mt-1">Punktacja na żywo</p>
      </div>
      {ranking.map((r,idx)=>{
        const medal=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':null;
        return (
          <div key={r.player.id} className={`bg-white border rounded-xl overflow-hidden ${idx===0&&r.total>0?'border-amber-400 shadow-md':'border-stone-200'}`}>
            <div className="p-3 sm:p-4">
              <div className="flex items-center justify-between gap-3 mb-2">
                <div className="flex items-center gap-3 min-w-0 flex-1">
                  <div style={{width:36,height:36,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:900,flexShrink:0,backdropFilter:'blur(8px)',
                    background:idx===0?'rgba(217,119,6,.5)':idx===1?'rgba(156,163,175,.25)':idx===2?'rgba(180,83,9,.35)':'rgba(255,255,255,.1)',
                    color:idx===0?'#fde68a':idx===1?'#e5e7eb':idx===2?'#fdba74':'rgba(255,255,255,.6)',
                    border:idx===0?'1px solid rgba(253,230,138,.4)':idx===1?'1px solid rgba(229,231,235,.2)':idx===2?'1px solid rgba(253,186,116,.3)':'1px solid rgba(255,255,255,.12)'}}>
                    {medal||`#${idx+1}`}
                  </div>
                  <div className="min-w-0 flex-1">
                    <div className="font-semibold text-stone-900 truncate">{r.player.name}</div>
                    <div className="text-[11px] text-stone-500"><Icon name="check" size={10} className="inline"/>  {r.exact} dokł. · {r.partial} cz.</div>
                  </div>
                </div>
                <div className="text-right shrink-0">
                  <div className="font-display text-3xl tracking-wider text-stone-900 leading-none">{r.total}</div>
                  <div className="text-[10px] uppercase tracking-wider text-stone-500">pkt</div>
                </div>
              </div>
              <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden mb-2">
                <div className={`h-full rounded-full ${idx===0?'bg-amber-400':'bg-[#006940]'}`} style={{width:`${(r.total/maxTotal)*100}%`}}/>
              </div>
              <div className="grid grid-cols-5 gap-1 text-[11px]">
                {[
                  {v:r.gm,l:'Grupa',   bg:'rgba(13,27,150,.45)', accent:'#93c5fd'},
                  {v:r.km,l:'Puchar',  bg:'rgba(7,89,133,.45)',  accent:'#7dd3fc'},
                  {v:r.go,l:'Tabele',  bg:'rgba(88,28,135,.45)', accent:'#d8b4fe'},
                  {v:r.podium,l:'Podium',bg:'rgba(146,64,14,.45)',accent:'#fcd34d'},
                  {v:r.awards,l:'Nagrody',bg:'rgba(159,18,57,.45)',accent:'#fda4af'},
                ].map(({v,l,bg,accent})=>(
                  <div key={l} style={{background:bg,backdropFilter:'blur(8px)',border:`1px solid ${accent}30`,borderRadius:8,padding:'4px 2px',textAlign:'center'}}>
                    <div style={{fontWeight:800,fontSize:16,color:'white',lineHeight:1.1}}>{v}</div>
                    <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'0.06em',color:accent,marginTop:2}}>{l}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  WIDOK: MOJE TYPY
// ═══════════════════════════════════════════════════════════════
function MyPredictionsView({activePlayerId,players,matches,teams,predictions,results}) {
  const player=players.find(p=>p.id===activePlayerId);
  const rows=useMemo(()=>{
    if(!activePlayerId) return [];
    return matches.map(m=>{
      const pred=predictions[`${activePlayerId}:${m.id}`];
      const res=results[m.id];
      const pts=pred&&res?scoreMatch(pred,res,m.phase):null;
      const q=predictionQuality(pred,res,m.phase);
      return {match:m,prediction:pred,result:res,points:pts,quality:q};
    }).filter(r=>r.prediction);
  },[activePlayerId,matches,predictions,results]);

  if(!activePlayerId) return <div className="text-center text-sm text-stone-600 bg-amber-50 border border-amber-200 rounded-lg p-4 mt-4">Wybierz uczestnika na górze ekranu</div>;
  const totalPts=rows.reduce((s,r)=>s+(r.points||0),0);
  return (
    <div className="space-y-3">
      <div className="bg-gradient-to-br from-[#1a1a3a] to-[#0d1b5e] text-white rounded-xl p-4">
        <h3 className="font-display text-xl tracking-wide flex items-center gap-2"><Icon name="user" size={20}/>{player?.name}</h3>
        <div className="grid grid-cols-3 gap-2 mt-3">
          <div><div className="font-display text-2xl">{rows.length}</div><div className="text-[10px] uppercase text-stone-300">Typów</div></div>
          <div><div className="font-display text-2xl">{rows.filter(r=>r.result).length}</div><div className="text-[10px] uppercase text-stone-300">Rozlicz.</div></div>
          <div><div className="font-display text-2xl text-amber-300">{totalPts}</div><div className="text-[10px] uppercase text-stone-300">Pkt</div></div>
        </div>
      </div>
      {rows.length===0&&<div className="text-center text-stone-500 py-12 bg-white border border-stone-200 rounded-lg">Nie masz jeszcze typów. Przejdź do zakładki <strong>Mecze</strong>.</div>}
      <div style={{display:'flex',flexDirection:'column',gap:3}}>
        {rows.map(({match,prediction,result,points,quality})=>{
          const home=teams[match.homeTeamId], away=teams[match.awayTeamId];
          const rowBg=!result
            ?{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)'}
            :quality==='exact'
              ?{background:'rgba(0,160,60,.30)',border:'1px solid rgba(0,220,80,.45)'}
              :quality==='partial'
                ?{background:'rgba(200,100,0,.30)',border:'1px solid rgba(220,140,0,.45)'}
                :{background:'rgba(180,0,0,.28)',border:'1px solid rgba(220,0,0,.40)'};
          return (
            <div key={match.id} style={{...rowBg,borderRadius:8,padding:'7px 10px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
              <div style={{display:'flex',alignItems:'center',gap:6,minWidth:0,flex:1}}>
                <Badge>{match.phase==='group'?`Gr ${match.group}`:PHASE_LABELS[match.phase].split(' ')[0]}</Badge>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,display:'flex',alignItems:'center',gap:3}}>
                  <span style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.65)',fontFamily:'monospace'}}>{FLAG_ABBR[home?.flag||'']||NAME_TO_ABBR[home?.name?.toLowerCase()]||''}</span>
                  <span style={{color:'white',fontWeight:600}}>{home?.name||'?'}</span>
                  <span style={{color:'rgba(255,255,255,.35)',margin:'0 2px'}}>vs</span>
                  <span style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.65)',fontFamily:'monospace'}}>{FLAG_ABBR[away?.flag||'']||NAME_TO_ABBR[away?.name?.toLowerCase()]||''}</span>
                  <span style={{color:'white',fontWeight:600}}>{away?.name||'?'}</span>
                </span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,fontFamily:'ui-monospace,monospace',fontSize:13}}>
                <strong style={{color:'white'}}>{prediction.home}:{prediction.away}</strong>
                {result&&<>
                  <Icon name="arrow" size={12} style={{stroke:'rgba(255,255,255,.5)',flexShrink:0}}/>
                  <strong style={{color:'white'}}>{result.home}:{result.away}</strong>
                  <span style={{fontWeight:800,fontSize:14,minWidth:22,textAlign:'right',color:quality==='exact'?'#4ade80':quality==='partial'?'#fbbf24':'#f87171'}}>{points>0?`+${points}`:'0'}</span>
                </>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  WIDOK: PORÓWNANIE
// ═══════════════════════════════════════════════════════════════
function CompareView({matches,teams,predictions,results,players}) {
  const [phaseFilter,setPhaseFilter]=useState('all');
  const [sortNearest,setSortNearest]=useState(false);
  const now=useMemo(()=>new Date(),[]);
  const filtered=useMemo(()=>{
    const base=matches.filter(m=>phaseFilter==='all'||m.phase===phaseFilter);
    if(sortNearest){
      const sorted=[...base].sort((a,b)=>Math.abs(new Date(a.date)-now)-Math.abs(new Date(b.date)-now));
      const top3=sorted.slice(0,3);
      const top3ids=new Set(top3.map(m=>m.id));
      const rest=base.filter(m=>!top3ids.has(m.id)).sort((a,b)=>PHASE_ORDER.indexOf(a.phase)-PHASE_ORDER.indexOf(b.phase)||a.num-b.num);
      return [...top3,...rest];
    }
    return [...base].sort((a,b)=>PHASE_ORDER.indexOf(a.phase)-PHASE_ORDER.indexOf(b.phase)||a.num-b.num);
  },[matches,phaseFilter,sortNearest,now]);
  if(players.length===0) return <div className="text-center text-stone-500 py-12">Dodaj graczy, żeby porównywać typy.</div>;
  return (
    <div className="space-y-3">
      <div className="bg-white border border-[#b0bce8] rounded-xl p-3 filters-sticky shadow-sm">
        <div className="flex gap-1 overflow-x-auto mb-2">
          {[{k:'all',l:'Wszystkie'},{k:'group',l:'Grupowa'},{k:'r32',l:'1/16'},{k:'r16',l:'1/8'},{k:'qf',l:'1/4'},{k:'sf',l:'1/2'},{k:'final',l:'Finał'}].map(t=>(
            <button key={t.k} onClick={()=>setPhaseFilter(t.k)} className={`shrink-0 px-3 py-1.5 rounded-lg text-xs font-semibold ${phaseFilter===t.k?'bg-[#0d1b5e] text-white':'bg-stone-100 text-stone-700'}`}>{t.l}</button>
          ))}
        </div>
        <button onClick={()=>setSortNearest(s=>!s)}
          className={`w-full py-1.5 rounded-lg text-xs font-semibold flex items-center justify-center gap-1.5 transition-colors ${sortNearest?'bg-[#0d1b5e] text-white':'bg-stone-100 text-stone-700'}`}>
          Sortuj od: nadchodzące mecze
        </button>
      </div>
      {filtered.map(m=>{
        const home=teams[m.homeTeamId], away=teams[m.awayTeamId], result=results[m.id];
        return (
          <div key={m.id} style={{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',borderRadius:14,padding:14,marginBottom:8}}>
            {/* Nagłówek: badge + wynik rzeczywisty */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <Badge>{m.phase==='group'?`Gr ${m.group}`:PHASE_LABELS[m.phase].split(' ')[0]}</Badge>
                <span style={{fontSize:11,color:'rgba(255,255,255,.4)'}}>#{m.num}</span>
              </div>
              {result
                ? <div style={{fontFamily:'Bebas Neue,sans-serif',fontSize:20,letterSpacing:'0.08em',color:'white',padding:'3px 12px',background:'rgba(0,160,60,.35)',border:'1px solid rgba(0,220,80,.45)',borderRadius:8}}>
                    {result.home} : {result.away}
                  </div>
                : <span style={{fontSize:11,color:'rgba(255,255,255,.35)',fontStyle:'italic'}}>brak wyniku</span>
              }
            </div>
            {/* Nazwa meczu */}
            <div style={{fontSize:13,fontWeight:600,color:'rgba(255,255,255,.75)',marginBottom:10,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {home?.name||'?'} <span style={{color:'rgba(255,255,255,.3)',fontWeight:400}}>vs</span> {away?.name||'?'}
            </div>
            {/* Lista graczy */}
            <div style={{display:'flex',flexDirection:'column',gap:3}}>
              {players.map(pl=>{
                const pp=predictions[`${pl.id}:${m.id}`];
                if(!pp) return (
                  <div key={pl.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 10px',borderRadius:8,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)'}}>
                    <span style={{fontSize:13,color:'rgba(255,255,255,.4)'}}>{pl.name}</span>
                    <span style={{fontSize:12,color:'rgba(255,255,255,.25)',fontStyle:'italic'}}>brak</span>
                  </div>
                );
                const q=predictionQuality(pp,result,m.phase);
                const pts=result?scoreMatch(pp,result,m.phase):null;
                const rowBg=!result?{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)'}
                  :q==='exact'?{background:'rgba(0,160,60,.30)',border:'1px solid rgba(0,220,80,.45)'}
                  :q==='partial'?{background:'rgba(200,100,0,.30)',border:'1px solid rgba(220,140,0,.45)'}
                  :{background:'rgba(180,0,0,.28)',border:'1px solid rgba(220,0,0,.40)'};
                return (
                  <div key={pl.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 10px',borderRadius:8,...rowBg}}>
                    <span style={{fontSize:13,fontWeight:600,color:'white'}}>{pl.name}</span>
                    <span style={{fontFamily:'ui-monospace,monospace',fontSize:13,color:'white',display:'flex',alignItems:'center',gap:8}}>
                      <strong>{pp.home}:{pp.away}</strong>
                      {pts!==null&&<span style={{fontWeight:800,fontSize:14,color:pts>=3?'#4ade80':pts>0?'#fbbf24':'#f87171'}}>{pts>0?`+${pts}`:'0'}</span>}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PhaseLockPanel({matches,phaseLocks,onSavePhaseLocks}) {
  const PHASE_DEFS=[
    {key:'specials', label:'Typy specjalne', desc:'Kolejność grup, podium, król strzelców, MVP', icon:'⭐', specialNote:true},
    {key:'compareVisible', label:'Porównanie widoczne', desc:'Zakładki "Porównanie" i "Typy wszystkich" dostępne dla graczy', icon:'👁️', compareNote:true},
    {key:'group', label:'Faza grupowa', desc:'Mecze 1–72', icon:'⚽'},
    {key:'r32',   label:'1/16 finału',  desc:'Mecze 73–88', icon:'🥊'},
    {key:'r16',   label:'1/8 finału',   desc:'Mecze 89–96', icon:'⚔️'},
    {key:'qf',    label:'Ćwierćfinały', desc:'Mecze 97–100', icon:'🏅'},
    {key:'sf',    label:'Półfinały',    desc:'Mecze 101–102', icon:'🔥'},
    {key:'third', label:'Mecz o 3. miejsce', desc:'Mecz 103', icon:'🥉'},
    {key:'final', label:'Finał',        desc:'Mecz 104', icon:'🏆'},
  ];

  // Wyznacz pierwszy mecz każdej fazy
  const firstMatchDate=useMemo(()=>{
    const map={};
    PHASE_DEFS.forEach(({key})=>{
      const phaseMatches=matches.filter(m=>m.phase===key&&m.date);
      if(phaseMatches.length){
        const sorted=[...phaseMatches].sort((a,b)=>new Date(a.date)-new Date(b.date));
        map[key]=sorted[0].date;
      }
    });
    return map;
  },[matches]);

  const [localLocks,setLocalLocks]=useState(phaseLocks||{});
  const [saved,setSaved]=useState(false);
  useEffect(()=>setLocalLocks(phaseLocks||{}),[phaseLocks]);

  const toggle=(key)=>setLocalLocks(prev=>({...prev,[key]:!prev[key]}));

  const handleSave=()=>{
    onSavePhaseLocks(localLocks);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  const fmtDate=(iso)=>{
    if(!iso) return '—';
    try {
      return new Intl.DateTimeFormat('pl-PL',{
        timeZone:'Europe/Warsaw', weekday:'short', day:'numeric',
        month:'short', hour:'2-digit', minute:'2-digit', hour12:false
      }).format(new Date(iso));
    } catch(e){ return iso; }
  };

  return (
    <div className="space-y-3">
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-900">
        <p className="font-bold mb-1">🔒 Jak działają blokady i przełączniki?</p>
        <p>Zablokowanie fazy uniemożliwia graczom typowanie. Przełącznik <strong>Porównanie</strong> działa odwrotnie — włączenie go <em>udostępnia</em> zakładki Porównanie i Typy wszystkich graczom. Zrób to <strong>przed pierwszym meczem rundy</strong> — np. 24h wcześniej. Blokada <em>nie</em> wpływa na punktację (wyniki wpisuje admin niezależnie).</p>
      </div>

      {PHASE_DEFS.map(({key,label,desc,icon,specialNote,compareNote})=>{
        const isLocked=!!(localLocks[key]);
        const firstDate=firstMatchDate[key];
        const changed=isLocked!==(!!phaseLocks[key]);
        return (
          <div key={key} className={`bg-white border-2 rounded-xl p-4 transition-all ${key==='compareVisible'?(isLocked?'border-[#006940] bg-[#e6f4ec]':'border-stone-200'):(isLocked?'border-red-300 bg-red-50':'border-stone-200')}`}>
            <div className="flex items-center justify-between gap-3">
              <div className="flex items-center gap-3 min-w-0 flex-1">
                <span className="text-2xl">{icon}</span>
                <div className="min-w-0">
                  <div className="font-semibold text-stone-900 text-sm">{label}</div>
                  <div className="text-[11px] text-stone-500">{desc}</div>
                  {compareNote?(
                    <div className={`text-[11px] mt-0.5 font-medium ${isLocked?'text-[#006940]':'text-stone-400'}`}>
                      {isLocked?'✅ Zakładki widoczne dla graczy':'🚫 Zakładki ukryte dla graczy'}
                    </div>
                  ):specialNote?(
                    <div className={`text-[11px] mt-0.5 font-medium ${isLocked?'text-red-700':'text-amber-700'}`}>
                      {isLocked?'🔒 Zablokowane':'⏰ Deadline: przed 11.06.2026, godz. 21:00'}
                    </div>
                  ):firstDate&&(
                    <div className={`text-[11px] mt-0.5 font-medium ${isLocked?'text-red-700':'text-[#0d1b5e]'}`}>
                      {isLocked?'🔒 Zablokowane':'⏰ Pierwszy mecz: '}{!isLocked&&fmtDate(firstDate)}
                    </div>
                  )}
                </div>
              </div>
              <button
                onClick={()=>toggle(key)}
                style={{width:'48px',height:'26px',position:'relative',borderRadius:'13px',flexShrink:0,transition:'background .2s',cursor:'pointer',border:'none',outline:'none',background:isLocked?(key==='compareVisible'?'#006940':'#ef4444'):'#d1d5db'}}
                aria-label={isLocked?'Odblokuj':'Zablokuj'}
              >
                <span style={{position:'absolute',top:'3px',left:isLocked?'25px':'3px',width:'20px',height:'20px',background:'white',borderRadius:'50%',boxShadow:'0 1px 3px rgba(0,0,0,.25)',transition:'left .2s',display:'block'}}/>
              </button>
            </div>
            {changed&&(
              <div className="mt-2 text-[11px] text-amber-700 font-semibold">
                ⚠ Niezapisana zmiana — kliknij Zapisz poniżej
              </div>
            )}
          </div>
        );
      })}

      <div className="flex gap-2 pt-2">
        <Btn variant={saved?'gold':'primary'} size="lg" onClick={handleSave} className="flex-1">
          <Icon name={saved?'check':'save'} size={16}/>
          {saved?'Zapisano!':'Zapisz blokady'}
        </Btn>
      </div>

      <div className="bg-stone-50 border border-stone-200 rounded-xl p-3 text-xs text-stone-600 space-y-1">
        <p className="font-bold text-stone-800">📋 Sugerowany harmonogram blokad:</p>
        <p>• <strong>Porównanie</strong> — włącz kiedy chcesz (np. po zakończeniu fazy grupowej)</p>
        <p>• <strong>Typy specjalne</strong> — zablokuj do 10.06.2026 wieczór (dzień przed M1)</p>
        <p>• <strong>Faza grupowa</strong> — zablokuj do 10.06.2026 wieczór (dzień przed M1)</p>
        <p>• <strong>1/16 finału</strong> — zablokuj do 27.06.2026 wieczór (dzień przed M73)</p>
        <p>• <strong>1/8 finału</strong> — zablokuj do 03.07.2026 wieczór (dzień przed M89)</p>
        <p>• <strong>Ćwierćfinały</strong> — zablokuj do 08.07.2026 wieczór</p>
        <p>• <strong>Półfinały</strong> — zablokuj do 13.07.2026 wieczór</p>
        <p>• <strong>Mecz o 3. m.</strong> — zablokuj do 17.07.2026 wieczór</p>
        <p>• <strong>Finał</strong> — zablokuj do 18.07.2026 wieczór</p>
      </div>
    </div>
  );
}

function AdminGate({adminPassword,onUnlock,onSetPassword}) {
  const [input,setInput]=useState(''); const [confirm,setConfirm]=useState(''); const [error,setError]=useState('');
  if(!adminPassword) return (
    <div className="bg-white border border-stone-200 rounded-xl p-5 max-w-md mx-auto">
      <div className="text-center mb-4"><Icon name="lock" size={32} className="text-[#0d1b5e] mx-auto mb-2 block"/><h3 className="font-display text-xl tracking-wide">Ustaw hasło admina</h3><p className="text-xs text-stone-500 mt-1">Jednorazowe — zapamiętaj dobrze!</p></div>
      <input type="password" value={input} onChange={e=>setInput(e.target.value)} placeholder="Nowe hasło" className="w-full px-3 py-2.5 border-2 border-stone-200 rounded-lg focus:border-[#0d1b5e] focus:outline-none text-sm mb-2"/>
      <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Powtórz hasło" className="w-full px-3 py-2.5 border-2 border-stone-200 rounded-lg focus:border-[#0d1b5e] focus:outline-none text-sm mb-3"/>
      {error&&<p className="text-xs text-red-600 mb-2">{error}</p>}
      <Btn variant="primary" size="lg" className="w-full" onClick={()=>{
        if(input.length<3){setError('Hasło musi mieć min. 3 znaki');return;}

  );
  return (
    <div className="bg-white border border-stone-200 rounded-xl p-5 max-w-md mx-auto">
      <div className="text-center mb-4"><Icon name="lock" size={32} className="text-[#0d1b5e] mx-auto mb-2 block"/><h3 className="font-display text-xl tracking-wide">Panel administratora</h3></div>
      <input type="password" value={input} onChange={e=>{setInput(e.target.value);setError('');}} onKeyDown={e=>e.key==='Enter'&&onUnlock(input,err=>setError(err))} placeholder="Hasło" className="w-full px-3 py-2.5 border-2 border-stone-200 rounded-lg focus:border-[#0d1b5e] focus:outline-none text-sm mb-3" autoFocus/>
      {error&&<p className="text-xs text-red-600 mb-2">{error}</p>}

      {tab==='locks'&&(
        <PhaseLockPanel matches={matches} phaseLocks={phaseLocks||{}} onSavePhaseLocks={onSavePhaseLocks}/>

        <div className="space-y-2">
          <div className="bg-white border border-stone-200 rounded-xl p-3 space-y-2">
            <div className="relative"><Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400"/>
              <input value={matchSearch} onChange={e=>setMatchSearch(e.target.value)} placeholder="Szukaj drużyny / numeru (M5)" className="w-full pl-9 pr-3 py-2 border border-stone-200 rounded-lg focus:border-[#0d1b5e] focus:outline-none text-sm"/>

            <div className="flex gap-1 overflow-x-auto">

                <button key={t.k} onClick={()=>setMPhase(t.k)} className={`shrink-0 px-2.5 py-1 rounded text-xs font-semibold ${mPhase===t.k?'bg-[#0d1b5e] text-white':'bg-stone-100 text-stone-700'}`}>{t.l}</button>

              onSave={payload=>{onSaveResult(m.id,payload);setEditingId(null);}}
